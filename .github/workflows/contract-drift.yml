name: Wire-Contract Drift Gate

# Stops the per-client wire-shape drift that produced Drifts 1/2/4/5 from
# recurring. Three jobs make up the gate:
#
#   1. server-build — `dotnet build` of Planscape.sln. A server DTO rename that
#      breaks a controller (or any compile error in the new contract DTOs) fails
#      CI here. NB: we deliberately do NOT run `dotnet test` — the server test
#      suite is red on a pre-existing baseline (see planscape-server.yml, which
#      runs it with continue-on-error), so a test-suite gate would make CI
#      permanently fail. Add `dotnet test` here only once that baseline is green.
#
#   2. contract — client↔server DTO-conformance tests (Python). They each shape
#      the server's element DTOs themselves and pin that shaping to the server
#      DTO so a server-side rename breaks CI HERE — not silently in production.
#      The stingtools-core test `test_ifc_element_to_wire_keys_match_dto` parses
#      the C# DTO source (Planscape.Server/.../DTOs/IfcIngestDtos.cs) directly and
#      asserts the client's `_element_to_wire` output is a subset of the real DTO
#      members — so it needs neither a running server nor a generated OpenAPI doc.
#
#   3. mobile-typecheck — `tsc --noEmit` over the whole Planscape/ app. The mobile
#      api/types are hand-maintained against the server wire shape, so a TS error
#      here catches client-ahead-of-server drift (e.g. reading a field the server
#      doesn't send). The pre-existing 111-error baseline was driven to 0 across
#      Prompts 17–18, so this gate can finally go green and stay green; it triggers
#      on Planscape/** (the mobile tree only — Planscape.Server/** does not match).
#
# CRUCIAL: this workflow triggers on the SERVER DTO + controller paths as well as
# the client paths — that is what makes a server-only DTO rename fail CI (the
# existing ifc-substrate.yml runs the same Python tests but only triggers on
# shared/ifc). planscape-server.yml owns the full build+test+deploy pipeline on
# Planscape.Server/**; this gate is the focused, fast contract check.

on:
  push:
    paths:
      - 'Planscape.Server/src/Planscape.Core/DTOs/**'
      - 'Planscape.Server/src/Planscape.Core/Entities/**'
      - 'Planscape.Server/src/Planscape.API/Controllers/**'
      - 'stingtools-core/python/**'
      - 'StingBridge/**'
      - 'Planscape/**'
      - '.github/workflows/contract-drift.yml'
  pull_request:
    paths:
      - 'Planscape.Server/src/Planscape.Core/DTOs/**'
      - 'Planscape.Server/src/Planscape.Core/Entities/**'
      - 'Planscape.Server/src/Planscape.API/Controllers/**'
      - 'stingtools-core/python/**'
      - 'StingBridge/**'
      - 'Planscape/**'
      - '.github/workflows/contract-drift.yml'
  workflow_dispatch:

jobs:
  server-build:
    name: Server build (DTOs compile)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: Planscape.Server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore Planscape.sln

      - name: Build (Release, no test)
        # Build only — the test suite is a separate, currently-red baseline
        # (planscape-server.yml runs it with continue-on-error). A DTO rename
        # that breaks a controller still fails the build here.
        run: dotnet build Planscape.sln --no-restore --configuration Release

  contract:
    name: Client ↔ server wire-contract tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install client test deps
        # `requests` is needed by the StingBridge client; stingtools-core has no
        # required deps and is imported from source via the in-repo sys.path
        # fallback (see StingBridge/planscape/client.py + the test harnesses).
        run: python -m pip install --upgrade pip requests

      - name: stingtools-core contract + smoke tests
        # Includes test_ifc_element_to_wire_keys_match_dto — fails if a member
        # of IfcElementDto is renamed/removed without updating _element_to_wire.
        run: python stingtools-core/python/tests/test_smoke.py

      - name: StingBridge → /ifc/data contract tests
        # Asserts the ArchiCAD bridge posts the cross-host contract (no fabricated
        # revitElementId; ifcGlobalId/hostElementId on the wire) via the SHARED
        # _element_to_wire, not a local copy.
        run: python StingBridge/tests/test_ifc_ingest.py

  mobile-typecheck:
    name: Mobile typecheck (tsc --noEmit)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: Planscape
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Planscape/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Typecheck
        # tsc --noEmit over the whole mobile app. Baseline cleared to 0 in
        # Prompts 17–18; keeps mobile api/types from silently drifting off the
        # server wire shape.
        run: npm run typecheck
