name: Planscape Mobile — Type-check, Lint & EAS Build

on:
  push:
    branches: [main]
    paths:
      - 'Planscape/**'
      - '.github/workflows/planscape-mobile.yml'
  pull_request:
    branches: [main]
    paths:
      - 'Planscape/**'
  workflow_dispatch:
    inputs:
      profile:
        description: "EAS build profile"
        required: true
        default: "preview"
        type: choice
        options: [development, preview, production]

defaults:
  run:
    working-directory: Planscape

env:
  NODE_VERSION: '20.x'

jobs:
  # ── Static checks ───────────────────────────────────────────────────────────
  check:
    name: Type-check + Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: Planscape/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint --if-present

  # ── EAS Build (manual trigger only — requires EXPO_TOKEN secret) ───────────
  build:
    name: EAS ${{ github.event.inputs.profile }} build
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: Planscape/package-lock.json

      - uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build via EAS
        run: eas build --platform all --profile ${{ github.event.inputs.profile }} --non-interactive --no-wait
