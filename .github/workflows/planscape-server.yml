name: Planscape Server — Build, Test & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'Planscape.Server/**'
      - '.github/workflows/planscape-server.yml'
  pull_request:
    branches: [main]
    paths:
      - 'Planscape.Server/**'

env:
  DOTNET_VERSION: '8.0.x'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/planscape-api

jobs:
  # ── Build & Test ──────────────────────────────────────────────────────────────
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Planscape.Server

    # A real PostgreSQL. The suite's other DbContexts are EF InMemory / SQLite,
    # and neither emits the SQL that broke /seq/reserve in production (PR #441:
    # FirstAsync composing over non-composable INSERT … RETURNING). Without a
    # server in CI that whole bug class stays invisible.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: planscape_test
          POSTGRES_USER: planscape
          POSTGRES_PASSWORD: planscape_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore Planscape.sln

      - name: Build
        run: dotnet build Planscape.sln --no-restore --configuration Release

      # ── Gate 1: the Postgres integration tests must be 100% green ──────────
      #
      # Small, new, and carrying no legacy debt, so "all must pass" is a
      # meaningful bar. They SKIP (not pass) when PLANSCAPE_TEST_PG is unset,
      # which is why it is set explicitly here — a silent skip in CI would be
      # the same false comfort this gate exists to remove.
      - name: Run Postgres integration tests
        env:
          PLANSCAPE_TEST_PG: "Host=localhost;Port=5432;Database=planscape_test;Username=planscape;Password=planscape_ci"
          Jwt__Key: "ci-only-3xJ9pQ7wR2mV5nB8kL4hT6yG1sD0aZfE"
        run: |
          dotnet test Planscape.sln --no-build --configuration Release             --filter "FullyQualifiedName~Postgres" --verbosity normal

      # ── Gate 2: no NEW failures in the rest of the suite ───────────────────
      #
      # WHY NOT "zero failures": the suite carries 66 uniquely-named
      # pre-existing failures (73 cases). Gating on zero makes CI permanently
      # red and therefore ignored — which is exactly how this step ended up with
      # `continue-on-error: true` and a comment claiming "No tests yet" while
      # 400+ tests existed. Gating on "nothing NEW broke" is enforceable today.
      #
      # Fixing a baseline entry: delete its line from
      # Planscape.Server/tests/known-failing-tests.txt in the same PR, and the
      # check then guards the fix.
      - name: Run full test suite
        id: fullsuite
        env:
          PLANSCAPE_TEST_PG: "Host=localhost;Port=5432;Database=planscape_test;Username=planscape;Password=planscape_ci"
          Jwt__Key: "ci-only-3xJ9pQ7wR2mV5nB8kL4hT6yG1sD0aZfE"
        run: |
          set +e
          dotnet test Planscape.sln --no-build --configuration Release             --verbosity normal 2>&1 | tee /tmp/test-output.txt
          exit 0            # the diff below decides pass/fail, not the exit code

      - name: Fail only on NEW test failures
        run: bash tests/check-new-failures.sh /tmp/test-output.txt

      - name: Generate OpenAPI spec
        working-directory: Planscape.Server
        run: |
          # Install swagger CLI tool
          dotnet tool restore 2>/dev/null || dotnet tool install --global Swashbuckle.AspNetCore.Cli --version 6.9.0 2>/dev/null || true
          # Try to export openapi.json — non-fatal if swagger tool unavailable
          dotnet swagger tofile \
            --output src/Planscape.API/openapi.json \
            src/Planscape.API/bin/Release/net8.0/Planscape.API.dll v1 2>/dev/null || \
          echo "::notice::OpenAPI export skipped (swagger CLI unavailable — install Swashbuckle.AspNetCore.Cli)"
        continue-on-error: true

      - name: Upload OpenAPI spec artifact
        uses: actions/upload-artifact@v4
        if: hashFiles('Planscape.Server/src/Planscape.API/openapi.json') != ''
        with:
          name: openapi-spec-${{ github.sha }}
          path: Planscape.Server/src/Planscape.API/openapi.json
          retention-days: 90

      - name: Check for migration drift
        working-directory: Planscape.Server
        run: |
          # Verify EF model matches migrations (catches forgotten migrations)
          dotnet ef migrations list \
            --project src/Planscape.Infrastructure/Planscape.Infrastructure.csproj \
            --startup-project src/Planscape.API/Planscape.API.csproj \
            --no-connect 2>/dev/null | tail -5 || \
          echo "::notice::EF migration list skipped (no DB connection in CI — expected)"
        continue-on-error: true
        env:
          # Dummy connection so EF tooling doesn't crash; --no-connect should suffice
          ConnectionStrings__Default: "Host=localhost;Database=ci_check;Username=ci;Password=ci"

  # ── Redis single-use (handoff jti replay) ─────────────────────────────────────
  #
  # DEP-6a. The handoff jti guard is a Redis `SET … When.NotExists` that FAILS
  # OPEN when Redis is absent — so the replay proof is meaningful only against a
  # real Redis. It is env-gated (PLANSCAPE_TEST_REDIS) exactly like the Postgres
  # tests, and SKIPS otherwise. It lives in its OWN job with its own Redis
  # service on purpose: attaching a Redis service to the `build` job would make
  # the app connect to it in every step and could silently shift the
  # known-failing baseline the full-suite gate diffs against. Here it is
  # isolated — only the one replay test runs, and it must be green.
  redis-single-use:
    name: Redis single-use (handoff jti replay)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Planscape.Server

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore Planscape.sln

      - name: Build
        run: dotnet build Planscape.sln --no-restore --configuration Release

      # Must PASS (not skip): PLANSCAPE_TEST_REDIS is set and the redis service
      # is healthy, so a silent skip here would be the same false comfort the
      # Postgres gate removes. The app's default Redis:Connection is
      # localhost:6379, which the service maps.
      - name: Run handoff jti replay test
        env:
          PLANSCAPE_TEST_REDIS: "1"
          Jwt__Key: "ci-only-3xJ9pQ7wR2mV5nB8kL4hT6yG1sD0aZfE"
        run: |
          dotnet test Planscape.sln --no-build --configuration Release \
            --filter "FullyQualifiedName~Handoff_SameTicketReplayed_SecondRedemptionIsRejected" \
            --verbosity normal

  # ── Docker Build & Push ───────────────────────────────────────────────────────
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Buildx with the docker-container driver is REQUIRED for GHA cache export
      # (cache-to: type=gha). Without it the default 'docker' driver is used and
      # the build fails: "Cache export is not supported for the docker driver."
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          # Context = repo root: the Dockerfile COPYs repo-root paths
          # (Planscape/assets/viewer/, Planscape.Server/src/**, COPY . .) and is
          # documented "Build context is the STINGTOOLS repo root" (matches
          # docker-compose's context: ../..). 'Planscape.Server' was wrong and
          # made every COPY fail "not found".
          context: .
          file: Planscape.Server/docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to Render.com ──────────────────────────────────────────────────────
  deploy:
    name: Deploy to Render.com
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://api.planscape.build

    steps:
      - name: Trigger Render.com deploy
        run: |
          curl -s -X POST "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": false}'
        # Secrets required: RENDER_API_KEY, RENDER_SERVICE_ID
        # Add these in GitHub → Settings → Secrets and variables → Actions
