name: Planscape Web — Type-check, Test & Build

on:
  push:
    branches: [main]
    paths:
      - 'planscape-web/**'
      - '.github/workflows/planscape-web.yml'
  pull_request:
    branches: [main]
    paths:
      - 'planscape-web/**'
      - '.github/workflows/planscape-web.yml'

defaults:
  run:
    working-directory: planscape-web

jobs:
  build:
    name: Type-check + Test + Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      # No committed lockfile yet, so npm install (not npm ci) and no cache key.
      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE: https://api.planscape.build
