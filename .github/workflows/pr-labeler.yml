name: PR Labeler + Size Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  label:
    name: Auto-label PR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply path-based labels
        uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
        continue-on-error: true  # Labeler fails gracefully if labels don't exist yet

      - name: PR size check + summary
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            const additions = pr.additions;
            const deletions = pr.deletions;
            const changed = pr.changed_files;
            const total = additions + deletions;

            // Size labels
            let sizeLabel = 'size/S';
            if (total > 1000) sizeLabel = 'size/XL';
            else if (total > 500) sizeLabel = 'size/L';
            else if (total > 200) sizeLabel = 'size/M';
            else if (total > 50) sizeLabel = 'size/S';
            else sizeLabel = 'size/XS';

            // Ensure size label exists then apply
            try {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: sizeLabel,
                color: total > 1000 ? 'e4461d' : total > 500 ? 'e99695' : total > 200 ? 'f9d0c4' : 'c2e0c6',
              });
            } catch {}

            try {
              // Remove old size labels first
              const labels = await github.rest.issues.listLabelsOnIssue({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
              });
              for (const l of labels.data) {
                if (l.name.startsWith('size/') && l.name !== sizeLabel) {
                  await github.rest.issues.removeLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: context.issue.number,
                    name: l.name,
                  }).catch(() => {});
                }
              }
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: [sizeLabel],
              });
            } catch (e) {
              console.log('Label apply failed (non-fatal):', e.message);
            }

            // Write job summary
            const warn = total > 500 ? '\n> ⚠️ **Large PR** — consider splitting into smaller commits.' : '';
            await core.summary
              .addHeading('PR Size')
              .addTable([
                [{data: 'Files', header: true}, {data: 'Additions', header: true}, {data: 'Deletions', header: true}, {data: 'Total', header: true}],
                [String(changed), `+${additions}`, `-${deletions}`, String(total)]
              ])
              .addRaw(warn)
              .write();
