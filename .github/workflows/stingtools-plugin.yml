name: StingTools Plugin — Build, Validate & Release

on:
  push:
    branches: [main]
    paths:
      - 'StingTools/**'
      - 'Planscape/assets/viewer/**'
      - '.github/workflows/stingtools-plugin.yml'
  pull_request:
    branches: [main]
    paths:
      - 'StingTools/**'
      - 'Planscape/assets/viewer/**'

jobs:
  # ── 1. Data file validation (Linux, fast) ────────────────────────────────────
  validate-data:
    name: Validate data files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON data files
        run: |
          FAIL=0
          for f in StingTools/Data/**/*.json StingTools/Data/*.json; do
            [ -f "$f" ] || continue
            if ! python3 -c "import json,sys; json.load(open('$f'))" 2>/dev/null; then
              echo "❌ Invalid JSON: $f"
              FAIL=1
            fi
          done
          [ $FAIL -eq 0 ] && echo "✓ All JSON files valid"
          exit $FAIL

      - name: Check for duplicate parameter GUIDs
        run: |
          python3 - <<'EOF'
          import re, sys, collections

          seen = collections.defaultdict(list)
          guid_re = re.compile(r'\b([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12})\b')

          for path in ['StingTools/Data/MR_PARAMETERS.txt', 'StingTools/Data/MR_PARAMETERS.csv']:
              try:
                  for i, line in enumerate(open(path), 1):
                      for guid in guid_re.findall(line):
                          seen[guid.lower()].append(f'{path}:{i}')
              except FileNotFoundError:
                  pass

          dupes = {g: locs for g, locs in seen.items() if len(locs) > 1}
          if dupes:
              for guid, locs in dupes.items():
                  print(f'❌ Duplicate GUID {guid}:')
                  for loc in locs:
                      print(f'   {loc}')
              sys.exit(1)
          print(f'✓ No duplicate GUIDs ({len(seen)} unique)')
          EOF

      - name: Validate CSV structure (required columns)
        run: |
          python3 - <<'EOF'
          import csv, sys, os

          REQUIRED_COLS = {
            'MR_SCHEDULES.csv': {'ScheduleName', 'Category', 'Discipline'},
            'COBIE_TYPE_MAP.csv': {'StingCategory', 'COBieType'},
            'TAG_STYLE_RULES.json': None,  # JSON, skip
          }
          FAIL = 0
          for fname, cols in REQUIRED_COLS.items():
              if cols is None:
                  continue
              path = f'StingTools/Data/{fname}'
              if not os.path.exists(path):
                  continue
              try:
                  with open(path) as f:
                      header = next(csv.reader(f))
                  missing = cols - set(header)
                  if missing:
                      print(f'❌ {fname} missing columns: {missing}')
                      FAIL = 1
              except Exception as e:
                  print(f'❌ {fname}: {e}')
                  FAIL = 1
          if not FAIL:
              print('✓ CSV structure valid')
          sys.exit(FAIL)
          EOF

  # ── 2. Viewer JS syntax gate (Linux, fast) ───────────────────────────────────
  viewer-check:
    name: Viewer JS syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: Planscape/assets/viewer/package-lock.json

      - name: Install viewer deps
        working-directory: Planscape/assets/viewer
        run: npm ci --no-audit --no-fund

      - name: Syntax check all JS files
        working-directory: Planscape/assets/viewer
        run: npm run check

      - name: Vite build (verify bundle compiles)
        working-directory: Planscape/assets/viewer
        run: npm run build
        continue-on-error: true  # build failures are warnings until CI serves dist/

      - name: Report bundle size
        working-directory: Planscape/assets/viewer
        if: always()
        run: |
          if [ -d dist ]; then
            echo "### Viewer bundle sizes" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            du -sh dist/*.js dist/*.css 2>/dev/null | sort -rh >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            TOTAL=$(du -sh dist/ | cut -f1)
            echo "Total: $TOTAL (target < 200KB)" >> $GITHUB_STEP_SUMMARY
          fi

  # ── 3. Plugin build (Windows, uses stubs from tools/revit-stubs/ if present) ─
  build:
    name: Build plugin
    runs-on: windows-latest
    needs: [validate-data]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
          cache: true

      - name: Restore dependencies
        working-directory: StingTools
        run: dotnet restore StingTools.csproj
        shell: pwsh

      - name: Build with in-tree Revit stubs
        working-directory: StingTools
        shell: pwsh
        run: |
          # Prefer in-tree stubs (tools/revit-stubs/), fall back gracefully
          $stubPath = Join-Path $env:GITHUB_WORKSPACE "tools\revit-stubs\output"
          if (Test-Path "$stubPath\RevitAPI.dll") {
            Write-Host "Using in-tree Revit API stubs: $stubPath"
            dotnet build StingTools.csproj `
              -p:RevitApiPath="$stubPath" `
              --configuration Release `
              --no-restore `
              -warnaserror:CS0246,CS0234  # Missing type refs = hard failure
          } else {
            Write-Host "In-tree stubs not found — project restore only (stubs pending PR merge)"
            Write-Host "::warning::Revit API stubs not present. Full build skipped."
          }

      - name: Upload build artifacts
        if: success() && hashFiles('StingTools/bin/Release/StingTools.dll') != ''
        uses: actions/upload-artifact@v4
        with:
          name: stingtools-plugin-${{ github.sha }}
          path: |
            StingTools/bin/Release/StingTools.dll
            StingTools/bin/Release/*.dll
            StingTools/Data/**
            StingTools.addin
          retention-days: 30

  # ── 4. Release packaging (main branch only) ──────────────────────────────────
  release-package:
    name: Package release zip
    runs-on: windows-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: stingtools-plugin-${{ github.sha }}
          path: release-staging

      - name: Build release zip
        shell: pwsh
        run: |
          $version = (Select-Xml -Path StingTools/StingTools.csproj -XPath '//Version').Node.InnerText
          $zipName = "StingTools-$version-$($env:GITHUB_SHA.Substring(0,8)).zip"

          # Create install folder structure
          New-Item -ItemType Directory -Force release-pkg\STING
          New-Item -ItemType Directory -Force release-pkg\STING\data

          # Copy DLLs (skip Revit API stubs — Revit provides those)
          Get-ChildItem release-staging\*.dll |
            Where-Object { $_.Name -notin @('RevitAPI.dll','RevitAPIUI.dll') } |
            Copy-Item -Destination release-pkg\STING\

          # Copy data files
          if (Test-Path release-staging\Data) {
            Copy-Item -Recurse release-staging\Data\* release-pkg\STING\data\
          }

          # Write .addin pointing at %AppData% destination
          $addinXml = @"
<?xml version="1.0" encoding="utf-8"?>
<RevitAddIns>
  <AddIn Type="Application">
    <Name>STING Tools</Name>
    <Assembly>%AppData%\Autodesk\Revit\Addins\STING\StingTools.dll</Assembly>
    <AddInId>A1B2C3D4-5678-9ABC-DEF0-123456789ABC</AddInId>
    <FullClassName>StingTools.Core.StingToolsApp</FullClassName>
    <VendorId>Planscape</VendorId>
    <VendorDescription>Planscape - ISO 19650 BIM Automation</VendorDescription>
    <VendorEmail>support@planscape.app</VendorEmail>
    <UseRevitContext>false</UseRevitContext>
  </AddIn>
</RevitAddIns>
"@
          $addinXml | Set-Content release-pkg\StingTools.addin

          # Write install instructions
          @"
# STING Tools v$version — Installation

1. Copy the STING\ folder to: %AppData%\Autodesk\Revit\Addins\STING\
2. Copy StingTools.addin to your Revit version folder:
   %AppData%\Autodesk\Revit\Addins\2025\   (or 2026 / 2027)
3. Restart Revit.

See https://github.com/${{ github.repository }} for full documentation.
"@ | Set-Content release-pkg\INSTALL.txt

          Compress-Archive -Path release-pkg\* -DestinationPath $zipName
          echo "ZIP_NAME=$zipName" >> $env:GITHUB_ENV
          echo "PLUGIN_VERSION=$version" >> $env:GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.PLUGIN_VERSION }}-${{ github.run_number }}
          name: StingTools v${{ env.PLUGIN_VERSION }} (build ${{ github.run_number }})
          body: |
            Automated release from main branch.
            Commit: ${{ github.sha }}

            ## Install
            1. Download the zip below
            2. Extract and copy `STING\` → `%AppData%\Autodesk\Revit\Addins\STING\`
            3. Copy `StingTools.addin` → `%AppData%\Autodesk\Revit\Addins\2025\`
            4. Restart Revit
          files: ${{ env.ZIP_NAME }}
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
