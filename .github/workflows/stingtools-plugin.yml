name: StingTools Plugin — Build, Validate & Release

on:
  push:
    branches: [main]
    paths:
      - 'StingTools/**'
      - 'tools/revit-stubs/**'
      - 'StingTools.Standards/**'
      - 'Planscape.Server/src/Planscape.Shared/**'
      - 'Planscape.Server/src/Planscape.PluginSync/**'
      - '.github/workflows/stingtools-plugin.yml'
  pull_request:
    branches: [main]
    paths:
      - 'StingTools/**'
      - 'tools/revit-stubs/**'
      - 'StingTools.Standards/**'
      - '.github/workflows/stingtools-plugin.yml'

env:
  DOTNET_VERSION: '8.0.x'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: '1'
  DOTNET_NOLOGO: '1'

jobs:
  # ── 1. Data file validation (Linux, fast) ────────────────────────────────────
  validate-data:
    name: Validate data files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON data files
        run: |
          FAIL=0
          for f in StingTools/Data/**/*.json StingTools/Data/*.json; do
            [ -f "$f" ] || continue
            if ! python3 -c "import json,sys; json.load(open('$f'))" 2>/dev/null; then
              echo "❌ Invalid JSON: $f"
              FAIL=1
            fi
          done
          [ $FAIL -eq 0 ] && echo "✓ All JSON files valid"
          exit $FAIL

      - name: Check for duplicate parameter GUIDs
        run: |
          python3 - <<'EOF'
          import re, sys, csv

          # MR_PARAMETERS.csv is the documented CSV *mirror* of MR_PARAMETERS.txt —
          # the same shared-parameter set, same GUIDs, in two formats. A GUID present
          # in BOTH files is therefore expected and correct, NOT a collision. The real
          # Revit invariant is WITHIN-FILE uniqueness (a GUID identifies exactly one
          # parameter inside a single shared-parameter file). We enforce that per file,
          # plus a cross-file consistency check so the same GUID can't map to two
          # DIFFERENT parameter names across the mirror — which WOULD be a genuine
          # collision the old cross-file count could never distinguish from the mirror.
          guid_re = re.compile(r'^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$')
          fail = False

          def parse_txt(path):
              m, dups = {}, []
              for i, line in enumerate(open(path, encoding='utf-8'), 1):
                  if not line.startswith('PARAM\t'):
                      continue
                  t = line.rstrip('\n').split('\t')          # PARAM, GUID, NAME, ...
                  if len(t) < 3:
                      continue
                  g, name = t[1].lower(), t[2]
                  if g in m:
                      dups.append((g, m[g][1], name, i))
                  m[g] = (i, name)
              return m, dups

          def parse_csv(path):
              m, dups = {}, []
              with open(path, encoding='utf-8') as fh:
                  hdr = gi = ni = None
                  for i, row in enumerate(csv.reader(fh), 1):
                      if not row or row[0].lstrip().startswith('#'):
                          continue
                      if hdr is None:                        # first non-comment row = header
                          hdr = row
                          gi, ni = hdr.index('Parameter_GUID'), hdr.index('Parameter_Name')
                          continue
                      if len(row) <= max(gi, ni):
                          continue
                      g, name = row[gi].lower(), row[ni]
                      if not guid_re.match(g):
                          continue
                      if g in m:
                          dups.append((g, m[g][1], name, i))
                      m[g] = (i, name)
              return m, dups

          txt, txt_dups = parse_txt('StingTools/Data/MR_PARAMETERS.txt')
          csvm, csv_dups = parse_csv('StingTools/Data/MR_PARAMETERS.csv')

          for label, dups in (('MR_PARAMETERS.txt', txt_dups), ('MR_PARAMETERS.csv', csv_dups)):
              for g, a, b, line in dups:
                  print(f'❌ Within-file duplicate GUID {g} in {label}:{line} ({a!r} vs {b!r})')
                  fail = True

          for g in set(txt) & set(csvm):
              if txt[g][1].strip() != csvm[g][1].strip():
                  print(f'❌ GUID {g} maps to different params across the mirror: '
                        f'txt={txt[g][1]!r} csv={csvm[g][1]!r}')
                  fail = True

          if fail:
              sys.exit(1)
          print(f'✓ GUIDs unique within each file; txt↔csv mirror consistent '
                f'(txt={len(txt)}, csv={len(csvm)})')
          EOF

      - name: Validate CSV structure (required columns)
        run: |
          python3 - <<'EOF'
          import csv, sys, os

          # Required columns use the ACTUAL header names the data files ship and the
          # plugin reads (the previous ScheduleName/StingCategory/COBieType names never
          # existed in these files). The header is the first non-comment row — both
          # files may start with '#'-prefixed version banners that the plugin skips.
          REQUIRED_COLS = {
            # ScheduleCommands.cs reads cols Record_Type/Source_File/Discipline/
            # Schedule_Name/Category (skipping '#' lines).
            'MR_SCHEDULES.csv': {'Record_Type', 'Discipline', 'Schedule_Name', 'Category'},
            # COBIE_TYPE_MAP.csv maps each equipment TypeCode → its STING product code.
            'COBIE_TYPE_MAP.csv': {'TypeCode', 'Category', 'StingProdCode'},
          }
          FAIL = 0
          for fname, cols in REQUIRED_COLS.items():
              if cols is None:
                  continue
              path = f'StingTools/Data/{fname}'
              if not os.path.exists(path):
                  continue
              try:
                  header = None
                  with open(path, encoding='utf-8') as f:
                      for row in csv.reader(f):
                          if not row or row[0].lstrip().startswith('#'):
                              continue  # skip comment / blank lines to reach the header
                          header = row
                          break
                  missing = cols - set(header or [])
                  if missing:
                      print(f'❌ {fname} missing columns: {missing}')
                      FAIL = 1
                  else:
                      print(f'✓ {fname} has required columns')
              except Exception as e:
                  print(f'❌ {fname}: {e}')
                  FAIL = 1
          if not FAIL:
              print('✓ CSV structure valid')
          sys.exit(FAIL)
          EOF

  # ── 2. Viewer JS syntax gate (Linux, fast) ───────────────────────────────────
  viewer-check:
    name: Viewer JS syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: Planscape/assets/viewer/package-lock.json

      - name: Install viewer deps
        working-directory: Planscape/assets/viewer
        run: npm ci --no-audit --no-fund

      - name: Syntax check all JS files
        working-directory: Planscape/assets/viewer
        run: npm run check

      - name: Vite build (verify bundle compiles)
        working-directory: Planscape/assets/viewer
        run: npm run build
        continue-on-error: true  # build failures are warnings until CI serves dist/

      - name: Report bundle size
        working-directory: Planscape/assets/viewer
        if: always()
        run: |
          if [ -d dist ]; then
            echo "### Viewer bundle sizes" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            du -sh dist/*.js dist/*.css 2>/dev/null | sort -rh >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            TOTAL=$(du -sh dist/ | cut -f1)
            echo "Total: $TOTAL (target < 200KB)" >> $GITHUB_STEP_SUMMARY
          fi

  # ── 3. Plugin build (Windows, uses stubs from tools/revit-stubs/ if present) ─
  build:
    name: Build StingTools Plugin
    # Windows required — UseWPF=true and UseWindowsForms=true need Windows SDK
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # ── Step 1: Build Revit API stubs ───────────────────────────────────────
      # The real Revit API DLLs ship only with Autodesk Revit (not redistributable).
      # We maintain a set of minimal type-only stubs in tools/revit-stubs/ so the
      # plugin can be compiled for CI. The stubs are compile-time-only — at runtime
      # Revit loads the real assemblies from its own installation directory.
      - name: Build Revit API stubs
        run: |
          $stubsDir = "tools\revit-stubs"
          $outDir   = "$stubsDir\bin"
          New-Item -ItemType Directory -Force -Path $outDir | Out-Null

          # Build RevitAPI stub
          dotnet build "$stubsDir\RevitAPI\RevitAPI.csproj" `
            --configuration Release `
            --output $outDir `
            --nologo `
            -v minimal

          # Build RevitAPIUI stub (depends on RevitAPI)
          dotnet build "$stubsDir\RevitAPIUI\RevitAPIUI.csproj" `
            --configuration Release `
            --output $outDir `
            --nologo `
            -v minimal
        shell: pwsh

      # ── Step 2: Restore NuGet packages for dependent projects ───────────────
      - name: Restore dependencies (Planscape.Shared)
        run: dotnet restore Planscape.Server/src/Planscape.Shared/Planscape.Shared.csproj
        shell: pwsh

      - name: Restore dependencies (Planscape.PluginSync)
        run: dotnet restore Planscape.Server/src/Planscape.PluginSync/Planscape.PluginSync.csproj
        shell: pwsh

      - name: Restore dependencies (StingTools.Standards)
        run: dotnet restore StingTools.Standards/StingTools.Standards.csproj
        shell: pwsh

      - name: Restore dependencies (StingTools plugin)
        run: |
          dotnet restore StingTools/StingTools.csproj `
            -p:RevitApiStubsDir="${{ github.workspace }}\tools\revit-stubs\bin"
        shell: pwsh

      # ── Step 3: Build the plugin ────────────────────────────────────────────
      - name: Build StingTools plugin (with stubs)
        run: |
          dotnet build StingTools/StingTools.csproj `
            --configuration Release `
            --no-restore `
            -p:RevitApiStubsDir="${{ github.workspace }}\tools\revit-stubs\bin" `
            --nologo `
            -v minimal
        shell: pwsh

      # ── Step 4: Deploy to CompiledPlugin/ ───────────────────────────────────
      - name: Package plugin output
        run: |
          $buildOut   = "StingTools\bin\Release"
          $deployDir  = "CompiledPlugin"
          $dataDir    = "$deployDir\data"
          New-Item -ItemType Directory -Force -Path $deployDir | Out-Null
          New-Item -ItemType Directory -Force -Path $dataDir   | Out-Null

          # Main DLL
          Copy-Item "$buildOut\StingTools.dll" $deployDir -Force

          # Dependency DLLs (exclude Revit API stubs — not needed at runtime)
          Get-ChildItem "$buildOut\*.dll" |
            Where-Object { $_.Name -notin @('RevitAPI.dll','RevitAPIUI.dll') } |
            Copy-Item -Destination $deployDir -Force

          # Data files
          if (Test-Path "$buildOut\data") {
            Copy-Item "$buildOut\data\*" $dataDir -Recurse -Force
          } elseif (Test-Path "StingTools\Data") {
            Copy-Item "StingTools\Data\*" $dataDir -Recurse -Force
          }

          # Addin manifest
          Copy-Item "StingTools.addin" $deployDir -Force

          $dllCount  = (Get-ChildItem "$deployDir\*.dll").Count
          $dataCount = (Get-ChildItem $dataDir -Recurse -File).Count
          Write-Host ""
          Write-Host "=== PLUGIN PACKAGED ==="
          Write-Host "Location  : $deployDir"
          Write-Host "DLLs      : $dllCount"
          Write-Host "Data files: $dataCount"
        shell: pwsh

      # ── Step 5: Upload artifact ─────────────────────────────────────────────
      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: StingTools-Plugin-${{ github.sha }}
          path: CompiledPlugin/
          retention-days: 14
