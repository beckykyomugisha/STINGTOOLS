name: StingTools Plugin — Build, Validate & Release

on:
  push:
    branches: [main]
    paths:
      - 'StingTools/**'
      - 'StingTools.Standards/**'
      - 'Planscape.Server/src/Planscape.Shared/**'
      - 'Planscape.Server/src/Planscape.PluginSync/**'
      - '.github/workflows/stingtools-plugin.yml'
  pull_request:
    branches: [main]
    paths:
      - 'StingTools/**'
      - 'StingTools.Standards/**'
      - '.github/workflows/stingtools-plugin.yml'

env:
  DOTNET_VERSION: '8.0.x'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: '1'
  DOTNET_NOLOGO: '1'

jobs:
  # ── 1. Data file validation (Linux, fast) ────────────────────────────────────
  validate-data:
    name: Validate data files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON data files
        run: |
          FAIL=0
          for f in StingTools/Data/**/*.json StingTools/Data/*.json; do
            [ -f "$f" ] || continue
            if ! python3 -c "import json,sys; json.load(open('$f'))" 2>/dev/null; then
              echo "❌ Invalid JSON: $f"
              FAIL=1
            fi
          done
          [ $FAIL -eq 0 ] && echo "✓ All JSON files valid"
          exit $FAIL

      - name: Check for duplicate parameter GUIDs
        run: |
          python3 - <<'EOF'
          import re, sys, collections

          # MR_PARAMETERS.csv is, BY DESIGN, a 1:1 mirror of MR_PARAMETERS.txt
          # (same parameter set, same GUIDs). A real duplicate is the SAME GUID
          # appearing twice WITHIN one file. The previous check pooled GUIDs from
          # both files into one dict, so every GUID looked "duplicated" (once in
          # the .txt, once in its .csv mirror) — a false positive that failed on
          # all 3286 params. Scope the duplicate check PER FILE; additionally
          # verify the two files mirror each other (same GUID set).
          guid_re = re.compile(r'\b([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12})\b')

          paths = ['StingTools/Data/MR_PARAMETERS.txt', 'StingTools/Data/MR_PARAMETERS.csv']
          FAIL = 0
          per_file_sets = {}
          for path in paths:
              seen = collections.defaultdict(list)
              try:
                  for i, line in enumerate(open(path), 1):
                      for guid in guid_re.findall(line):
                          seen[guid.lower()].append(i)
              except FileNotFoundError:
                  continue
              per_file_sets[path] = set(seen)
              dupes = {g: lines for g, lines in seen.items() if len(lines) > 1}
              if dupes:
                  for guid, lines in dupes.items():
                      print(f'❌ Duplicate GUID {guid} within {path}: lines {lines}')
                  FAIL = 1
              else:
                  print(f'✓ {path}: no within-file duplicate GUIDs ({len(seen)} unique)')

          # Mirror-integrity check: the .csv must carry the same GUID set as the .txt.
          if len(per_file_sets) == 2:
              a, b = per_file_sets[paths[0]], per_file_sets[paths[1]]
              only_txt, only_csv = a - b, b - a
              if only_txt or only_csv:
                  if only_txt:
                      print(f'❌ {len(only_txt)} GUID(s) in .txt missing from the .csv mirror: '
                            f'{sorted(only_txt)[:5]}')
                  if only_csv:
                      print(f'❌ {len(only_csv)} GUID(s) in .csv missing from the .txt source: '
                            f'{sorted(only_csv)[:5]}')
                  FAIL = 1
              else:
                  print(f'✓ .txt/.csv mirror in sync ({len(a)} GUIDs)')
          sys.exit(FAIL)
          EOF

      - name: Validate CSV structure (required columns)
        run: |
          python3 - <<'EOF'
          import csv, sys, os

          # Required columns are the ACTUAL column names in each file's real
          # header. The previous values were stale (e.g. 'ScheduleName' vs the
          # real 'Schedule_Name'; 'StingCategory'/'COBieType' which COBIE_TYPE_MAP
          # has never had — it uses the COBie Type-sheet schema TypeCode/TypeName/
          # Category). This check never actually ran on CI because the earlier
          # duplicate-GUID step aborted the job first, so the drift went unseen.
          # Several STING CSVs also start with a `#` comment banner, so skip
          # leading comment/blank lines before reading the header.
          REQUIRED_COLS = {
            'MR_SCHEDULES.csv': {'Schedule_Name', 'Category', 'Discipline'},
            'COBIE_TYPE_MAP.csv': {'TypeCode', 'TypeName', 'Category'},
          }

          def read_header(path):
              with open(path, encoding='utf-8') as f:
                  for row in csv.reader(f):
                      if not row:
                          continue
                      first = (row[0] or '').lstrip('﻿').strip()
                      if first.startswith('#') or first == '':
                          continue   # comment / blank banner line
                      return [c.lstrip('﻿').strip() for c in row]
              return []

          FAIL = 0
          for fname, cols in REQUIRED_COLS.items():
              path = f'StingTools/Data/{fname}'
              if not os.path.exists(path):
                  continue
              try:
                  header = read_header(path)
                  missing = cols - set(header)
                  if missing:
                      print(f'❌ {fname} missing columns: {missing} (header: {header[:8]}…)')
                      FAIL = 1
                  else:
                      print(f'✓ {fname}: required columns present')
              except Exception as e:
                  print(f'❌ {fname}: {e}')
                  FAIL = 1
          if not FAIL:
              print('✓ CSV structure valid')
          sys.exit(FAIL)
          EOF

  # ── 2. Viewer JS syntax gate (Linux, fast) ───────────────────────────────────
  viewer-check:
    name: Viewer JS syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: Planscape/assets/viewer/package-lock.json

      - name: Install viewer deps
        working-directory: Planscape/assets/viewer
        run: npm ci --no-audit --no-fund

      - name: Syntax check all JS files
        working-directory: Planscape/assets/viewer
        run: npm run check

      - name: Vite build (verify bundle compiles)
        working-directory: Planscape/assets/viewer
        run: npm run build
        continue-on-error: true  # build failures are warnings until CI serves dist/

      - name: Report bundle size
        working-directory: Planscape/assets/viewer
        if: always()
        run: |
          if [ -d dist ]; then
            echo "### Viewer bundle sizes" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            du -sh dist/*.js dist/*.css 2>/dev/null | sort -rh >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            TOTAL=$(du -sh dist/ | cut -f1)
            echo "Total: $TOTAL (target < 200KB)" >> $GITHUB_STEP_SUMMARY
          fi

  # ── 3. Plugin build (Windows, real Revit 2025 reference assemblies from NuGet) ─
  build:
    name: Build StingTools Plugin
    # Windows required — UseWPF=true and UseWindowsForms=true need Windows SDK
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # The plugin compiles against the REAL Revit 2025 reference assemblies
      # (Nice3point.Revit.Api.RevitAPI / .RevitAPIUI 2025.x) restored from NuGet —
      # see StingTools.csproj. No local Revit install + no $(RevitApiPath) here, so
      # the csproj's UseRevitNuget path kicks in. The hand-written stubs under
      # tools/revit-stubs/ are RETIRED (no longer built or referenced by CI).

      # ── Step 2: Restore NuGet packages for dependent projects ───────────────
      - name: Restore dependencies (Planscape.Shared)
        run: dotnet restore Planscape.Server/src/Planscape.Shared/Planscape.Shared.csproj
        shell: pwsh

      - name: Restore dependencies (Planscape.PluginSync)
        run: dotnet restore Planscape.Server/src/Planscape.PluginSync/Planscape.PluginSync.csproj
        shell: pwsh

      - name: Restore dependencies (StingTools.Standards)
        run: dotnet restore StingTools.Standards/StingTools.Standards.csproj
        shell: pwsh

      - name: Restore dependencies (StingTools plugin)
        run: dotnet restore StingTools/StingTools.csproj
        shell: pwsh

      # ── Step 3: Build the plugin ────────────────────────────────────────────
      - name: Build StingTools plugin (real Revit reference assemblies)
        run: |
          dotnet build StingTools/StingTools.csproj `
            --configuration Release `
            --no-restore `
            --nologo `
            -v minimal
        shell: pwsh

      # ── Step 4: Deploy to CompiledPlugin/ ───────────────────────────────────
      - name: Package plugin output
        run: |
          $buildOut   = "StingTools\bin\Release"
          $deployDir  = "CompiledPlugin"
          $dataDir    = "$deployDir\data"
          New-Item -ItemType Directory -Force -Path $deployDir | Out-Null
          New-Item -ItemType Directory -Force -Path $dataDir   | Out-Null

          # Main DLL
          Copy-Item "$buildOut\StingTools.dll" $deployDir -Force

          # Dependency DLLs (exclude Revit API stubs — not needed at runtime)
          Get-ChildItem "$buildOut\*.dll" |
            Where-Object { $_.Name -notin @('RevitAPI.dll','RevitAPIUI.dll') } |
            Copy-Item -Destination $deployDir -Force

          # Data files
          if (Test-Path "$buildOut\data") {
            Copy-Item "$buildOut\data\*" $dataDir -Recurse -Force
          } elseif (Test-Path "StingTools\Data") {
            Copy-Item "StingTools\Data\*" $dataDir -Recurse -Force
          }

          # Addin manifest
          Copy-Item "StingTools.addin" $deployDir -Force

          $dllCount  = (Get-ChildItem "$deployDir\*.dll").Count
          $dataCount = (Get-ChildItem $dataDir -Recurse -File).Count
          Write-Host ""
          Write-Host "=== PLUGIN PACKAGED ==="
          Write-Host "Location  : $deployDir"
          Write-Host "DLLs      : $dllCount"
          Write-Host "Data files: $dataCount"
        shell: pwsh

      # ── Step 5: Upload artifact ─────────────────────────────────────────────
      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: StingTools-Plugin-${{ github.sha }}
          path: CompiledPlugin/
          retention-days: 14
