# Planscape — PRODUCTION overlay (Caddy + Let's Encrypt + persistent state).
#
# Layers on top of the base stack — run BOTH files:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# What this overlay does (everything DOMAIN-driven — no hardcoded hosts):
#   • Fronts the API with Caddy, which obtains + renews Let's Encrypt certs
#     automatically for app.${DOMAIN}. The API no longer binds a host port.
#   • livekit.${DOMAIN} is DNS-ONLY (an A record straight to this VPS's public
#     IP) — LiveKit terminates its own TLS/TURN on :443, Caddy does NOT proxy it.
#   • Persists every piece of state on NAMED volumes: postgres (pgdata, base),
#     MinIO recordings (miniodata, base), Caddy's LE certs (caddy_data), and the
#     ASP.NET DataProtection key ring (dpkeys) — the last fixes the "keys not
#     persisted" warning so auth/antiforgery survive restarts.
#
# Prerequisites (see docs/DEPLOYMENT.md):
#   1) cp .env.production.template .env  and fill DOMAIN, DB_PASSWORD, JWT_KEY,
#      MINIO_ROOT_PASSWORD, LIVEKIT_API_KEY/SECRET, LIVEKIT_NODE_IP (public IP),
#      RESEND_API_KEY (or SMTP_*).  .env is gitignored — never commit it.
#   2) Point app.${DOMAIN} (and, separately, livekit.${DOMAIN}) A records at the
#      VPS public IP. Open 80/443 TCP (Caddy) and 443/tcp + 3478/udp (LiveKit TURN).

services:
  api:
    # Caddy fronts the API — drop the dev 5000 host binding, expose only on the
    # internal compose network for Caddy to reverse_proxy.
    ports: []
    expose:
      - "8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      # Single source of truth for every outward link + CORS (invites, resets,
      # share/QR, deep links). Derived purely from DOMAIN.
      - Planscape__PublicBaseUrl=${PUBLIC_BASE_URL:-https://app.${DOMAIN}}
      - Cors__Origins__0=https://app.${DOMAIN}
      # WS5 — persist the DataProtection key ring on the dpkeys named volume.
      - DataProtection__KeysPath=/app/keys
      # Recordings playback URLs must be BROWSER-reachable in prod (presigned
      # against the public MinIO/S3 host, not the internal compose host).
      - LiveKit__Url=${LIVEKIT_URL:-wss://livekit.${DOMAIN}}
      - LiveKit__Egress__S3__PublicEndpoint=${EGRESS_S3_PUBLIC_ENDPOINT:-https://recordings.${DOMAIN}}
    volumes:
      - dpkeys:/app/keys
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_healthy

  # Caddy — automatic HTTPS (Let's Encrypt) reverse proxy. The Caddyfile reads
  # {$DOMAIN} from the environment, so the same image serves any domain.
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN:?Set DOMAIN in .env (your live domain, e.g. example.com)}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data       # LE certs + ACME account — MUST persist
      - caddy_config:/config
    depends_on:
      - api
    restart: unless-stopped

  # LiveKit prod note: NODE_IP MUST be this VPS's PUBLIC IP (set LIVEKIT_NODE_IP
  # in .env) or browsers can't reach the media plane. TURN/TLS on :443 for clients
  # behind restrictive firewalls is configured in livekit.yaml (turn: block) — see
  # docs/DEPLOYMENT.md → "LiveKit media (ICE + TURN/TLS-443)".
  livekit:
    environment:
      - NODE_IP=${LIVEKIT_NODE_IP:?Set LIVEKIT_NODE_IP to this VPS public IP}

  # MinIO console should NOT be world-exposed in prod — bind it to loopback only.
  minio:
    ports:
      - "127.0.0.1:9001:9001"

  # Nightly pg_dump to a dedicated backup volume (retention handled in backup.sh).
  pgbackup:
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
    volumes:
      - pgbackups:/backups
      - ./backup/backup.sh:/usr/local/bin/backup.sh:ro
    entrypoint: ["/bin/sh", "-c", "crond -f -d 8"]
    command: []
    restart: unless-stopped

volumes:
  caddy_data:    # Let's Encrypt certs + ACME account — survives restarts.
  caddy_config:
  dpkeys:        # WS5 — ASP.NET DataProtection key ring (auth/antiforgery).
  pgbackups:
