services:
  api:
    build:
      context: ../..
      dockerfile: Planscape.Server/docker/Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__Default=Host=postgres;Port=5432;Database=planscape;Username=planscape;Password=${DB_PASSWORD:-Planscape2026!}
      - ConnectionStrings__Migrations=Host=postgres;Port=5432;Database=planscape;Username=planscape;Password=${DB_PASSWORD:-Planscape2026!}
      - Jwt__Key=${JWT_KEY:-Planscape-Production-Secret-Key-Min32Chars!!}
      - Jwt__Issuer=Planscape
      - Jwt__Audience=Planscape.Client
      - Redis__Connection=redis:6379
      - ModelConverter__Provider=${MODEL_CONVERTER_PROVIDER:-null}
      - ModelConverter__IfcConvertPath=/usr/local/bin/IfcConvert
      - ModelConverter__ThumbnailProvider=${MODEL_THUMBNAIL_PROVIDER:-gltf-bounds}
      - ModelConverter__Aps__ClientId=${APS_CLIENT_ID:-}
      - ModelConverter__Aps__ClientSecret=${APS_CLIENT_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: planscape
      POSTGRES_USER: planscape
      POSTGRES_PASSWORD: ${DB_PASSWORD:-Planscape2026!}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U planscape"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped

  # S5.2 — Node sidecar that splits uploaded GLBs into per-discipline
  # chunks via gltf-transform + Draco compression. Stays a separate
  # container so we can scale it horizontally without scaling the API.
  converter:
    build:
      context: ../src/converter-sidecar
    environment:
      API_BASE: http://api:8080
      API_BEARER: ${CONVERTER_API_BEARER:-}
      CONVERTER_TOKEN: ${CONVERTER_TOKEN:-planscape-converter-shared-secret}
    depends_on:
      - api
    restart: unless-stopped

  # Optional: Background job processing (Hangfire)
  worker:
    build:
      context: ../..
      dockerfile: Planscape.Server/docker/Dockerfile
    command: ["dotnet", "Planscape.API.dll", "--worker"]
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__Default=Host=postgres;Database=planscape;Username=planscape;Password=${DB_PASSWORD:-Planscape2026!}
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  # ── Observability stack (MON-01/02/03) ─────────────────────────────────
  # Opt-in via profile so they never run by default:
  #   docker compose --profile observability up -d
  # Then set in appsettings.*.json or env:
  #   Serilog__Seq__ServerUrl=http://seq:5341
  #   (Prometheus scrapes http://api:8080/metrics automatically via prometheus.yml)
  seq:
    image: datalust/seq:2024.3
    profiles: ["observability"]
    environment:
      ACCEPT_EULA: "Y"
    volumes:
      - seqdata:/data
    ports:
      - "5341:80"   # UI + ingestion
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.1
    profiles: ["observability"]
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0
    profiles: ["observability"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-planscape}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafanadata:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  seqdata:
  promdata:
  grafanadata:
