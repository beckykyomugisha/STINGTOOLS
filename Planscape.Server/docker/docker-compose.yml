services:
  api:
    build:
      context: ../..
      dockerfile: Planscape.Server/docker/Dockerfile
      args:
        # IFC→GLB viewer derivatives: set IFCCONVERT_URL in .env to an
        # IfcOpenShell IfcConvert linux64 zip URL to bake the binary in,
        # then set MODEL_CONVERTER_PROVIDER=ifcconvert. Default "skip"
        # leaves the converter off (uploads must already be GLB/glTF).
        IFCCONVERT_URL: ${IFCCONVERT_URL:-skip}
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Default=Host=postgres;Port=5432;Database=planscape;Username=planscape;Password=${DB_PASSWORD:-Planscape2026!};Include Error Detail=true      # Phase 175 — JWT_KEY MUST be supplied via .env or shell env.
      # ${JWT_KEY:?...} fails the compose run with a clear message if
      # the operator forgot to set it (instead of silently falling back
      # to a known-bad literal that bannedKeys would then reject at
      # startup anyway).
      - Jwt__Key=${JWT_KEY:?Set JWT_KEY in your shell or .env (32+ chars, e.g. `openssl rand -base64 48`)}
      - Jwt__Issuer=Planscape
      - Jwt__Audience=Planscape.Client
      - Redis__Connection=redis:6379
      - ModelConverter__Provider=${MODEL_CONVERTER_PROVIDER:-null}
      - ModelConverter__IfcConvertPath=/usr/local/bin/IfcConvert
      - ModelConverter__ThumbnailProvider=${MODEL_THUMBNAIL_PROVIDER:-gltf-bounds}
      - ModelConverter__Aps__ClientId=${APS_CLIENT_ID:-}
      - ModelConverter__Aps__ClientSecret=${APS_CLIENT_SECRET:-}
      # Phase 175 — OpenTelemetry. Default points at the otel-collector
      # service below; set OTEL_EXPORTER_OTLP_ENDPOINT in the env to
      # ship traces to a remote backend (Tempo, Honeycomb, Datadog…).
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}
      - OTEL_SERVICE_NAME=${OTEL_SERVICE_NAME:-planscape-api}
      # Phase 175 — ClamAV antivirus scanner. Set ClamAv__Enabled=true
      # to switch from the no-op scanner to the TCP clamd client
      # below. Off by default so a fresh `docker compose up` boots
      # without waiting on the (slow-starting) clamav image.
      - ClamAv__Enabled=${CLAMAV_ENABLED:-false}
      - ClamAv__Host=${CLAMAV_HOST:-clamav}
      - ClamAv__Port=${CLAMAV_PORT:-3310}
      # Shared secret the converter sidecar presents on POST /scene-nodes/ingest.
      # SceneNodesController.cs:108 reads Converter__ApiBearer and 401s when it's
      # empty/mismatched; the converter container sends CONVERTER_API_BEARER as
      # its API_BEARER (:149), so the api must read the SAME value here or the
      # converter→API derivative ingest is always rejected.
      - Converter__ApiBearer=${CONVERTER_API_BEARER:-}
      # ── Outward URLs: single source of truth ──
      # Set PUBLIC_BASE_URL in .env to the Cloudflare tunnel (or cloud) origin.
      # EVERY outward link (invite/reset emails, share/QR) + CORS derives from it.
      # Empty ⇒ falls back to the request host (fine for a bare localhost run).
      - Planscape__PublicBaseUrl=${PUBLIC_BASE_URL:-}
      # ── Real email via SMTP (Gmail app password is the pragmatic default) ──
      # All blank ⇒ NullEmailService logs a LOUD warning and drops mail.
      # Item 8 — accept short aliases (SMTP_USER/PASS/FROM) as well as the long names.
      - Smtp__Host=${SMTP_HOST:-}
      - Smtp__Port=${SMTP_PORT:-587}
      - Smtp__Username=${SMTP_USERNAME:-${SMTP_USER:-}}
      - Smtp__Password=${SMTP_PASSWORD:-${SMTP_PASS:-}}
      - Smtp__FromAddress=${SMTP_FROM_ADDRESS:-${SMTP_FROM:-}}
      - Smtp__FromName=${SMTP_FROM_NAME:-Planscape}
      # Gmail :587 uses STARTTLS ⇒ UseSsl=false. Gmail :465 ⇒ UseSsl=true.
      - Smtp__UseSsl=${SMTP_USE_SSL:-false}
      # ── Email provider selector (smtp [default] | resend) ──
      # smtp  ⇒ MailKit transport above (Gmail / Mailpit / Resend-SMTP).
      # resend ⇒ Resend HTTP API; needs RESEND_API_KEY + a from-address on the
      #          Resend-verified domain (SMTP_FROM_ADDRESS feeds the From for both).
      - Email__Provider=${Email__Provider:-smtp}
      - Resend__ApiKey=${RESEND_API_KEY:-}
      # ── LiveKit (WS3 A/V media plane) ──
      # Url is the BROWSER-reachable signaling URL (ws://localhost:7880 in dev).
      # The dev livekit service below runs with key 'devkey' / secret 'secret'.
      # Override all three via .env for staging/cloud; never commit real secrets.
      - LiveKit__Url=${LIVEKIT_URL:-ws://localhost:7880}
      - LiveKit__ApiKey=${LIVEKIT_API_KEY:-devkey}
      - LiveKit__ApiSecret=${LIVEKIT_API_SECRET:-secret}
      # N2 — server→livekit http endpoint for Egress Twirp calls (internal compose host).
      - LiveKit__ServerUrl=${LIVEKIT_SERVER_URL:-http://livekit:7880}
      # N2 — LiveKit Egress recording target → in-stack MinIO (functional locally).
      # Endpoint is the INTERNAL compose host (egress + api write/sign against it);
      # PublicEndpoint is BROWSER-reachable (presigned playback URLs). PROD: swap both
      # for the real S3 + a public CDN/host; secrets env-only (never commit prod keys).
      - LiveKit__Egress__S3__Endpoint=${EGRESS_S3_ENDPOINT:-http://minio:9000}
      - LiveKit__Egress__S3__PublicEndpoint=${EGRESS_S3_PUBLIC_ENDPOINT:-http://localhost:9000}
      - LiveKit__Egress__S3__Bucket=${EGRESS_S3_BUCKET:-recordings}
      - LiveKit__Egress__S3__Region=${EGRESS_S3_REGION:-us-east-1}
      - LiveKit__Egress__S3__AccessKey=${EGRESS_S3_ACCESS_KEY:-planscape}
      - LiveKit__Egress__S3__Secret=${EGRESS_S3_SECRET:-PlanscapeMinio2026!}
    depends_on:
      # NB: pgbouncer is intentionally NOT listed here. It lives behind the
      # optional `pool` profile (see below), and Compose rejects the whole
      # project ("depends on undefined service pgbouncer") if an active
      # service depends on a profile-gated one that isn't enabled. The api
      # connects to Host=postgres directly (see ConnectionStrings above);
      # when you opt into pooling with `--profile pool`, repoint the
      # connection string Host to `pgbouncer` as well.
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    volumes:
      # MODEL-VIEWER — persist uploaded model bytes across container
      # rebuilds. Without this volume, LocalFileStorageService writes
      # to /app/storage INSIDE the container, which is wiped every
      # `docker compose build`. The DB row survives (pgdata is volumed)
      # so the dashboard keeps showing a "published" entry pointing at
      # bytes that no longer exist → /api/.../models/.../file → 404.
      - storage:/app/storage
      # DEV-ITERATION — bind-mount the dashboard JS + CSS so edits to
      # wwwroot/js/*.js and wwwroot/css/*.css reflect in the browser
      # after a hard-reload (Ctrl+Shift+R) WITHOUT rebuilding the image.
      # Scoped to js/ and css/ on purpose — the top-level wwwroot also
      # holds the built viewer/ dist (baked in by Dockerfile from
      # Planscape/assets/viewer/) which we don't want to mask. If you
      # need to iterate on the Next.js viewer too, run `npm run build`
      # in Planscape/assets/viewer locally and the dist propagates via
      # an analogous bind-mount, or just docker compose build --no-cache.
      - ../src/Planscape.API/wwwroot/js:/app/wwwroot/js
      - ../src/Planscape.API/wwwroot/css:/app/wwwroot/css
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # LiveKit — WS3 A/V media SFU (camera/mic/screen-share). Dev mode ships a fixed
  # key/secret (devkey/secret) and binds signaling on :7880. The api mints LiveKit
  # JWTs (MeetingRoomController .../livekit-token) using the SAME key/secret. For
  # staging/cloud, run a real LiveKit deployment + set LIVEKIT_* in .env (never
  # commit secrets). UDP 50000-50019 + TCP 7881 carry media (TURN/TCP fallback).
  # N2 — CONFIGURED LiveKit (not --dev): shares Redis with the egress worker so
  # recording dispatch works, and posts egress webhooks back to the api. Same dev
  # keys (devkey:secret) so the A/V bar + livekit-token are unchanged.
  livekit:
    image: livekit/livekit-server:latest
    command: --config /etc/livekit.yaml
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro
    ports:
      - "7880:7880"               # signaling (ws) — the browser LiveKit:Url
      - "7881:7881"               # ICE/TCP fallback (carries media on localhost)
      - "50000-50019:50000-50019/udp"  # RTC media (small dev range)
    depends_on:
      - redis
    restart: unless-stopped

  # N2 — LiveKit Egress: records meeting rooms (room-composite A/V or audio-only) to
  # MinIO. Shares Redis with the livekit server (dispatch). The S3 target is sent
  # per-request by the api (LiveKitEgressClient → LiveKit:Egress:S3:*), so this
  # service only needs redis + the api creds + the internal ws_url. Default-on for
  # local proof; for prod, point at a real LiveKit + S3 (secrets env-only).
  egress:
    image: livekit/egress:latest
    environment:
      EGRESS_CONFIG_BODY: |
        redis:
          address: redis:6379
        api_key: ${LIVEKIT_API_KEY:-devkey}
        api_secret: ${LIVEKIT_API_SECRET:-secret}
        ws_url: ws://livekit:7880
    # Egress (chrome-based room-composite) needs SYS_ADMIN for the headless browser
    # sandbox. Documented LiveKit requirement for the egress container.
    cap_add:
      - SYS_ADMIN
    depends_on:
      - redis
      - livekit
    restart: unless-stopped

  # N2 — MinIO object store for meeting recordings (dev). Prod overlay
  # (docker-compose.prod.yml) already runs MinIO for attachments; this brings it into
  # the dev stack too so egress has a real S3 target. Console on :9001, S3 API on
  # :9000 (published so the api can presign BROWSER-reachable playback URLs).
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-planscape}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-PlanscapeMinio2026!}
    volumes:
      - miniodata:/data
    ports:
      - "9000:9000"   # S3 API → presigned playback URLs (http://localhost:9000/...)
      - "9001:9001"   # web console → http://localhost:9001
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # N2 — one-shot: create the "recordings" bucket on first boot (idempotent).
  createbuckets:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-planscape} ${MINIO_ROOT_PASSWORD:-PlanscapeMinio2026!} &&
      mc mb -p local/${EGRESS_S3_BUCKET:-recordings} ;
      echo 'bucket ready' "
    restart: "no"

  # Mailpit — local SMTP capture (dev/proof). Catches every outbound email so the
  # full send path + link can be PROVEN without real creds. Web UI on :8025, SMTP
  # on :1025 (no auth). To send REAL mail instead, point SMTP_HOST at smtp.gmail.com
  # + a valid app password in .env and restart api (env-only swap — see DEPLOYMENT.md).
  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"   # web UI / REST  → http://localhost:8025
      - "1025:1025"   # SMTP
    environment:
      - MP_SMTP_AUTH_ALLOW_INSECURE=true
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: planscape
      POSTGRES_USER: planscape
      POSTGRES_PASSWORD: ${DB_PASSWORD:-Planscape2026!}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U planscape"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # S3.4 — PgBouncer transaction-pooling proxy in front of Postgres.
  # Multiplexes 5,000 client connections onto ~50 backend connections so
  # the ASP.NET Core pool doesn't saturate Postgres at firm #6+.
  pgbouncer:
    # 2026-05 — pgbouncer is gated behind the optional `pool` profile.
    # Default `docker compose up` skips it (the API talks straight to
    # Postgres). To enable transaction pooling at scale:
    #   docker compose --profile pool up -d
    # The edoburu/pgbouncer 1.23.1 / 1.22.1 tags were withdrawn from
    # Docker Hub; bitnami/pgbouncer is actively maintained.
    profiles: ["pool"]
    image: bitnami/pgbouncer:latest
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: planscape
      DB_PASSWORD: ${DB_PASSWORD:-Planscape2026!}
      DB_NAME: planscape
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "5000"
      DEFAULT_POOL_SIZE: "50"
      RESERVE_POOL_SIZE: "10"
      RESERVE_POOL_TIMEOUT: "5"
      AUTH_TYPE: scram-sha-256
      ADMIN_USERS: planscape
      IGNORE_STARTUP_PARAMETERS: extra_float_digits,search_path,statement_timeout
    ports:
      - "6432:6432"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped

  # S5.2 — Node sidecar that splits uploaded GLBs into per-discipline
  # chunks via gltf-transform + Draco compression. Stays a separate
  # container so we can scale it horizontally without scaling the API.
  #
  # 2026-05 — gated behind the optional `converter` compose profile.
  # The Dockerfile COPYs a `handlers/` directory that hasn't been
  # written yet, so default `docker compose up` skipped it. Re-enable
  # once handlers/ is committed and the build passes:
  #   docker compose --profile converter up -d
  converter:
    profiles: ["converter"]
    build:
      context: ../src/converter-sidecar
    environment:
      API_BASE: http://api:8080
      API_BEARER: ${CONVERTER_API_BEARER:-}
      CONVERTER_TOKEN: ${CONVERTER_TOKEN:-planscape-converter-shared-secret}
    depends_on:
      - api
    restart: unless-stopped

  # Optional: Background job processing (Hangfire)
  worker:
    build:
      context: ../..
      dockerfile: Planscape.Server/docker/Dockerfile
      args:
        # The worker runs Hangfire jobs incl. ModelDerivativeJob (IFC→GLB),
        # so it needs the same IfcConvert binary as the api. See api.build.
        IFCCONVERT_URL: ${IFCCONVERT_URL:-skip}
    environment:
      # Worker shares the same Program.cs as the api, so it needs the same
      # env to wire DI / DbContext / Redis. Without Redis__Connection the
      # default 'localhost:6379' resolves to the worker container itself
      # (no redis there) and Hangfire/SignalR backplane fail on startup.
      - ASPNETCORE_ENVIRONMENT=Development
      # Phase 178 — PLANSCAPE_ROLE=worker activates the heavy Hangfire queues
      # (photo-redaction, IFC conversion, DB backup) without exposing HTTP.
      - PLANSCAPE_ROLE=worker
      - ConnectionStrings__Default=Host=postgres;Port=5432;Database=planscape;Username=planscape;Password=${DB_PASSWORD:-Planscape2026!};Include Error Detail=true      # Phase 175 — JWT_KEY MUST be supplied via .env or shell env.
      # ${JWT_KEY:?...} fails the compose run with a clear message if
      # the operator forgot to set it (instead of silently falling back
      # to a known-bad literal that bannedKeys would then reject at
      # startup anyway).
      - Jwt__Key=${JWT_KEY:?Set JWT_KEY in your shell or .env (32+ chars, e.g. `openssl rand -base64 48`)}
      - Jwt__Issuer=Planscape
      - Jwt__Audience=Planscape.Client
      - Redis__Connection=redis:6379
      - ModelConverter__Provider=${MODEL_CONVERTER_PROVIDER:-null}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      # Phase 186 — wait for the api container's /health endpoint to
      # report Healthy. The api container is the Hangfire schema steward;
      # if worker starts in parallel it will either race CREATE SCHEMA
      # (23505 duplicate key) or query Hangfire tables that don't exist
      # yet. Gating on api-healthy means the schema is guaranteed live
      # by the time worker boots.
      api:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      # Worker shares the api's storage volume so background jobs (e.g.
      # IFC→glTF derivative generation) can read uploaded models.
      - storage:/app/storage

  # ── Observability stack (MON-01/02/03) ─────────────────────────────────
  # Opt-in via profile so they never run by default:
  #   docker compose --profile observability up -d
  # Then set in appsettings.*.json or env:
  #   Serilog__Seq__ServerUrl=http://seq:5341
  #   (Prometheus scrapes http://api:8080/metrics automatically via prometheus.yml)
  seq:
    image: datalust/seq:2024.3
    profiles: ["observability"]
    environment:
      ACCEPT_EULA: "Y"
    volumes:
      - seqdata:/data
    ports:
      - "5341:80"   # UI + ingestion
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.1
    profiles: ["observability"]
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0
    profiles: ["observability"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-planscape}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafanadata:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

  # Phase 175 — ClamAV antivirus daemon. Off by default; enable by
  # setting CLAMAV_ENABLED=true in your .env. First boot downloads
  # the signature DB (~250 MB) so allow ~5 minutes before the
  # scanner becomes responsive.
  clamav:
    image: clamav/clamav:latest
    profiles: [ "av" ]
    environment:
      - CLAMAV_NO_FRESHCLAMD=false
    ports:
      - "3310:3310"
    volumes:
      - clamavdb:/var/lib/clamav
    healthcheck:
      test: [ "CMD-SHELL", "echo PING | nc -w 5 localhost 3310 | grep -q PONG" ]
      interval: 30s
      timeout: 10s
      retries: 6
    restart: unless-stopped

  # Phase 175 — OpenTelemetry Collector with tail-based sampling.
  # Receives OTLP/gRPC on 4317 from the API replicas, applies
  # tail_sampling (errors + slow + 5% baseline) and ships to the
  # debug exporter by default. Wire a real backend in
  # otel-collector-config.yaml (Jaeger / Tempo / Honeycomb etc.).
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.108.0
    command: [ "--config=/etc/otel/config.yaml" ]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel/config.yaml:ro
    ports:
      - "4317:4317"  # OTLP gRPC
      - "4318:4318"  # OTLP HTTP
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  seqdata:
  promdata:
  grafanadata:
  clamavdb:
  storage:   # MODEL-VIEWER — uploaded model bytes; survives rebuilds.
  miniodata: # N2 — meeting-recording object store (MinIO); survives rebuilds.
