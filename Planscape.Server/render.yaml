# render.yaml — Render.com Infrastructure-as-Code for Planscape Server
#
# ⚠️ SUPERSEDED: Render only auto-detects a blueprint at the REPOSITORY ROOT,
# and this file's dockerfilePath (./docker/Dockerfile) is wrong for the monorepo
# layout. The canonical, deployable blueprint is /render.yaml at the repo root.
# This copy is kept for reference only — do not point a Render Blueprint here.
#
# Deploy: push to main → Render detects /render.yaml → provisions all services
# Docs: https://render.com/docs/infrastructure-as-code

services:
  # ── Planscape API (ASP.NET Core 8) ──────────────────────────────────────────
  - type: web
    name: planscape-api
    runtime: docker
    dockerfilePath: ./docker/Dockerfile
    dockerContext: .
    branch: main
    region: frankfurt  # eu-central-1 — closest to UK/Europe clients
    plan: starter       # £6/mo — upgrade to standard (£19) when >60 concurrent users

    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production

      - key: ASPNETCORE_URLS
        value: http://+:8080

      # ── Database ──
      - key: ConnectionStrings__Default
        fromDatabase:
          name: planscape-db
          property: connectionString

      # ── JWT — set in Render dashboard (Settings → Environment) ──
      - key: Jwt__Key
        sync: false   # Must be set manually in Render dashboard — never commit secrets
      - key: Jwt__Issuer
        value: Planscape
      - key: Jwt__Audience
        value: Planscape.Client

      # ── Platform Owner bootstrap (PlatformOwnerSeeder) ──
      # The operator/founder login, seeded idempotently on startup. The email is
      # safe to declare here; the password is a secret set in the Render
      # dashboard. Seeding is a one-time bootstrap — after first boot, rotate the
      # password via change-password / forgot-password, not by editing this var.
      - key: PLANSCAPE_OWNER_EMAIL
        value: davis@planscape.build
      - key: PLANSCAPE_OWNER_PASSWORD
        sync: false   # Set in Render dashboard → Settings → Environment (secret). Required to make the Owner loginable.

      # ── CORS — web dashboard / app origins ──
      - key: Cors__Origins__0
        value: https://planscape.build
      - key: Cors__Origins__1
        value: https://app.planscape.build

      # ── Serilog ──
      - key: Serilog__MinimumLevel__Default
        value: Warning

    healthCheckPath: /health
    autoDeploy: true

    # Render free tier has cold starts — starter plan avoids this
    # Scale up: change plan to standard or pro in Render dashboard

  # ── Background worker (Hangfire job processor) ─────────────────────────────
  # Uncomment when background jobs are needed (e.g., scheduled compliance snapshots)
  # - type: worker
  #   name: planscape-worker
  #   runtime: docker
  #   dockerfilePath: ./docker/Dockerfile
  #   dockerContext: .
  #   branch: main
  #   region: frankfurt
  #   plan: starter
  #   envVars:
  #     - key: ConnectionStrings__Default
  #       fromDatabase:
  #         name: planscape-db
  #         property: connectionString
  #     - key: WORKER_MODE
  #       value: "true"

databases:
  # ── PostgreSQL 16 (managed by Render) ──────────────────────────────────────
  - name: planscape-db
    databaseName: planscape
    user: planscape
    region: frankfurt
    plan: starter    # £6/mo — 1GB storage, daily backups
    # Upgrade path: standard (£17/mo, 10GB) → pro (£70/mo, 100GB)
    # The connection string is injected automatically into the API via fromDatabase above

# ── Upgrade Guide ──────────────────────────────────────────────────────────────
# When to upgrade:
#   starter → standard API:  > 60 concurrent users or CPU > 70% sustained
#   starter → standard DB:   > 1GB data or need connection pooling (PgBouncer)
#
# Current cost at launch (3 projects, ~60 users):
#   API starter:  £6/month
#   DB starter:   £6/month
#   Total:        £12/month (+ Cloudflare free)
#
# At 10 projects / 200 users:
#   API standard: £19/month
#   DB standard:  £17/month
#   Total:        £36/month
