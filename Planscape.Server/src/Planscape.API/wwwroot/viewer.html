<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Planscape — model viewer</title>
<style>
  html, body { margin:0; padding:0; height:100%; background:#1a1a1a; color:#fff;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; overflow:hidden; }
  #status { position:absolute; top:8px; left:8px; font-size:12px; opacity:0.8;
    background:rgba(0,0,0,0.6); padding:4px 8px; border-radius:4px; z-index:10;
    pointer-events:none; }
  #status.error { background:rgba(180,40,40,0.85); }
  canvas { display:block; }
</style>
<!--
  C1 — Web dashboard model viewer.
  Three.js r148+ removed examples/js/ UMD builds. We use importmap + ESM so
  GLTFLoader and OrbitControls are imported from examples/jsm/ (the only
  supported path in r148+). importmap is supported by all evergreen browsers.
-->
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.min.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
</head>
<body>
<div id="status">Loading…</div>
<script type="module">
import * as THREE from "three";
import { GLTFLoader }    from "three/addons/loaders/GLTFLoader.js";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";

(async () => {
  "use strict";

  const statusEl = document.getElementById("status");
  function setStatus(msg, isError = false) {
    statusEl.textContent = msg;
    statusEl.className = isError ? "error" : "";
  }

  const params    = new URLSearchParams(location.search);
  const projectId = params.get("project");
  const modelId   = params.get("model");
  if (!projectId || !modelId) {
    setStatus("Missing ?project= or ?model= parameter.", true); return;
  }

  // Token — read from localStorage (set by dashboard on login).
  // Guard against the literal string "null" that appears when localStorage
  // returns null and it gets coerced into a string via string concatenation.
  const token = localStorage.getItem("planscape_token");
  const authHeader = token && token !== "null"
    ? { Authorization: "Bearer " + token }
    : {};

  // ── Scene setup ────────────────────────────────────────────────────────
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x1a1a1a);
  scene.add(new THREE.HemisphereLight(0xffffff, 0x404060, 0.9));
  const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
  dirLight.position.set(5, 10, 7.5);
  scene.add(dirLight);

  const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.01, 10000);
  camera.position.set(10, 10, 10);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(innerWidth, innerHeight);
  document.body.appendChild(renderer.domElement);

  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;

  window.addEventListener("resize", () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });

  // ── Fetch model metadata ───────────────────────────────────────────────
  setStatus("Fetching metadata…");
  let meta;
  try {
    const res = await fetch(
      `/api/projects/${projectId}/models/${modelId}`,
      { headers: authHeader }
    );
    if (res.status === 401 || res.status === 403) {
      setStatus("Not authorised. Try refreshing the dashboard and reopening.", true); return;
    }
    if (!res.ok) throw new Error(`HTTP ${res.status}: ${await res.text()}`);
    meta = await res.json();
  } catch (e) {
    setStatus("Metadata fetch failed: " + e.message, true); return;
  }

  // ── Load geometry ──────────────────────────────────────────────────────
  setStatus("Downloading model…");
  // access_token query param lets the file endpoint authenticate without
  // an Authorization header (GLTFLoader doesn't support custom headers).
  const tokenParam = token && token !== "null"
    ? "?access_token=" + encodeURIComponent(token)
    : "";
  const fileUrl = `/api/projects/${projectId}/models/${modelId}/file${tokenParam}`;

  const loader = new GLTFLoader();
  loader.load(
    fileUrl,
    (gltf) => {
      scene.add(gltf.scene);
      const box    = new THREE.Box3().setFromObject(gltf.scene);
      const size   = box.getSize(new THREE.Vector3());
      const centre = box.getCenter(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z);
      camera.position.copy(centre).add(
        new THREE.Vector3(maxDim * 1.8, maxDim * 1.4, maxDim * 1.8)
      );
      controls.target.copy(centre);
      controls.update();
      const sizeMb = (meta.fileSizeBytes / 1024 / 1024).toFixed(1);
      setStatus(`${meta.name} · ${sizeMb} MB`);
    },
    (prog) => {
      if (prog.total > 0)
        setStatus(`Loading ${Math.round((prog.loaded / prog.total) * 100)}%…`);
    },
    (err) => {
      const msg = err?.message ?? String(err);
      // GLTFLoader fires error for non-GLB files (e.g. IFC not yet converted).
      if (msg.includes("Unexpected token") || msg.includes("JSON"))
        setStatus("Model is not in GLB/glTF format. Upload a .glb file or wait for IFC conversion.", true);
      else
        setStatus("Load failed: " + msg, true);
    }
  );

  // ── Render loop ────────────────────────────────────────────────────────
  (function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
  })();
})();
</script>
</body>
</html>
