<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Planscape — model viewer</title>
<style>
  html, body { margin:0; padding:0; height:100%; background:#1a1a1a; color:#fff;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; overflow:hidden; }
  #status { position:absolute; top:8px; left:8px; font-size:12px; opacity:0.8;
    background:rgba(0,0,0,0.6); padding:4px 8px; border-radius:4px; z-index:10; }
  canvas { display:block; }
</style>
</head>
<body>
<div id="status">Loading…</div>
<!--
  C1 — Web dashboard's model viewer. Lifts the mobile viewer's HTML directly;
  three.js + GLTFLoader + OrbitControls are pulled from unpkg so the dashboard
  doesn't need the bundled copies (mobile uses local files for offline).
-->
<script src="https://unpkg.com/three@0.148.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.148.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://unpkg.com/three@0.148.0/examples/js/controls/OrbitControls.js"></script>
<script>
(async () => {
  "use strict";
  const params = new URLSearchParams(location.search);
  const projectId = params.get("project");
  const modelId   = params.get("model");
  const token     = localStorage.getItem("planscape_token");
  if (!projectId || !modelId) { status("Missing project / model id."); return; }

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x1a1a1a);
  scene.add(new THREE.HemisphereLight(0xffffff, 0x404060, 0.9));
  const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.01, 10000);
  camera.position.set(10, 10, 10);
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(innerWidth, innerHeight);
  document.body.appendChild(renderer.domElement);
  const controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  window.addEventListener("resize", () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });

  status("Fetching metadata…");
  let meta;
  try {
    const res = await fetch(`/api/projects/${projectId}/models/${modelId}`,
      { headers: { Authorization: "Bearer " + token } });
    if (!res.ok) throw new Error(await res.text());
    meta = await res.json();
  } catch (e) { status("Auth or metadata failed. " + e.message); return; }

  status("Downloading model…");
  const fileUrl = `/api/projects/${projectId}/models/${modelId}/file?access_token=${encodeURIComponent(token || "")}`;
  const loader = new THREE.GLTFLoader();
  loader.load(
    fileUrl,
    (gltf) => {
      scene.add(gltf.scene);
      const box = new THREE.Box3().setFromObject(gltf.scene);
      const size = box.getSize(new THREE.Vector3());
      const centre = box.getCenter(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z);
      camera.position.copy(centre).add(new THREE.Vector3(maxDim * 1.8, maxDim * 1.4, maxDim * 1.8));
      controls.target.copy(centre);
      controls.update();
      status(`${meta.name} · ${(meta.fileSizeBytes/1024/1024).toFixed(1)} MB`);
    },
    (prog) => { if (prog.total > 0) status(`Loading ${Math.round(prog.loaded/prog.total*100)}%…`); },
    (err)  => status("Load failed: " + err.message)
  );

  (function animate(){ requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); })();

  function status(s) { document.getElementById("status").textContent = s; }
})();
</script>
</body>
</html>
