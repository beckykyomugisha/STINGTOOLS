<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Planscape — model viewer</title>
<style>
  html, body { margin:0; padding:0; height:100%; background:#1a1a1a; color:#fff;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; overflow:hidden; }
  #status { position:absolute; top:8px; left:8px; font-size:12px; opacity:0.8;
    background:rgba(0,0,0,0.6); padding:4px 8px; border-radius:4px; z-index:10; }
  canvas { display:block; }
</style>
</head>
<body>
<div id="status">Loading…</div>
<!--
  C1 — Web dashboard's model viewer. Three.js >= 0.150 ships the legacy
  examples/js/ UMD builds as 'deprecated and removed'. The viewer used to
  pull THREE.GLTFLoader / THREE.OrbitControls as globals from those files
  but they 404 on the CDN, the IIFE crashed on 'new THREE.OrbitControls(…)',
  and the page sat on its initial 'Loading…' text forever.

  Switched to ES modules + an importmap so any modern three.js works.
-->
<script type="importmap">
{
  "imports": {
    "three":         "https://unpkg.com/three@0.160.0/build/three.module.min.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
"use strict";
import * as THREE        from "three";
import { GLTFLoader }    from "three/addons/loaders/GLTFLoader.js";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";

const params    = new URLSearchParams(location.search);
const projectId = params.get("project");
const modelId   = params.get("model");
const token     = localStorage.getItem("planscape_token");
const statusEl  = document.getElementById("status");
function status(s) { statusEl.textContent = s; }

// Guard: token must be present before any authenticated request is made.
// Without this check the Authorization header becomes "Bearer null" which
// the server rejects with 401 but the error message is confusing.
if (!token) {
  status("Not signed in — please open this viewer from the Planscape dashboard.");
} else if (!projectId || !modelId) {
  status("Missing project / model id.");
} else {
  status("Initialising scene…");
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x1a1a1a);
  // Hemisphere provides ambient fill; directional gives depth and shadows.
  scene.add(new THREE.HemisphereLight(0xffffff, 0x404060, 0.8));
  const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
  dirLight.position.set(1, 2, 1.5);
  scene.add(dirLight);

  const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.01, 10000);
  camera.position.set(10, 10, 10);
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(innerWidth, innerHeight);
  document.body.appendChild(renderer.domElement);
  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  window.addEventListener("resize", () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });

  (function animate(){ requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); })();

  const authHeader = { Authorization: "Bearer " + token };

  status("Fetching metadata…");
  let meta;
  try {
    const res = await fetch(`/api/projects/${projectId}/models/${modelId}`,
      { headers: authHeader });
    if (res.status === 401) {
      status("Session expired — please sign in again from the Planscape dashboard.");
      throw null; // skip model load
    }
    if (!res.ok) throw new Error(await res.text());
    meta = await res.json();
  } catch (e) {
    if (e) status("Metadata fetch failed: " + e.message);
  }

  if (meta) {
    status("Downloading model…");
    // Pass the JWT via Authorization header rather than ?access_token=
    // — keeps tokens out of URL bars, nginx access logs and browser
    // history, and avoids relying on a path-specific allowlist on the
    // server's JwtBearerEvents.OnMessageReceived handler.
    const fileUrl = `/api/projects/${projectId}/models/${modelId}/file`;
    const loader = new GLTFLoader();
    // setRequestHeader() is the documented GLTFLoader API for custom headers.
    // Assigning loader.requestHeader directly (property) is non-standard and
    // silently ignored in some three.js builds.
    loader.setRequestHeader(authHeader);
    loader.load(
      fileUrl,
      (gltf) => {
        scene.add(gltf.scene);
        const box = new THREE.Box3().setFromObject(gltf.scene);
        const size = box.getSize(new THREE.Vector3());
        const centre = box.getCenter(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z) || 1;
        camera.position.copy(centre).add(new THREE.Vector3(maxDim * 1.8, maxDim * 1.4, maxDim * 1.8));
        camera.near = Math.max(maxDim / 1000, 0.01);
        camera.far  = Math.max(maxDim * 100, 10000);
        camera.updateProjectionMatrix();
        controls.target.copy(centre);
        controls.update();
        status(`${meta.name} · ${(meta.fileSizeBytes/1024/1024).toFixed(1)} MB`);
      },
      (prog) => { if (prog.total > 0) status(`Loading ${Math.round(prog.loaded/prog.total*100)}%…`); },
      (err)  => status("Load failed: " + (err?.message || String(err)))
    );
  }
}
</script>
</body>
</html>
