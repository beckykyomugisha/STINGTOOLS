<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Planscape — model viewer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%; overflow: hidden; background: #111; color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex; flex-direction: column;
  }

  /* ── Toolbar — solid header above canvas ── */
  #toolbar {
    flex: 0 0 auto; display: flex; align-items: center; gap: 5px;
    padding: 0 10px; height: 40px;
    background: #1a1a28; border-bottom: 1px solid #333;
    overflow-x: auto; white-space: nowrap; user-select: none;
  }
  .sep { width: 1px; height: 22px; background: #444; flex-shrink: 0; }
  #status-txt {
    flex: 1 1 auto; font-size: 12px; color: #888;
    overflow: hidden; text-overflow: ellipsis; min-width: 0;
  }

  .tb-btn {
    flex-shrink: 0;
    background: transparent; border: 1px solid #3a3a50; border-radius: 4px;
    color: #bbb; font-size: 12px; padding: 4px 11px; cursor: pointer;
    transition: background .12s, color .12s, border-color .12s;
  }
  .tb-btn:hover  { background: #252545; border-color: #5570cc; color: #fff; }
  .tb-btn.active { background: #1a3a90; border-color: #4488ff; color: #fff; }

  /* ── Canvas area ── */
  #wrap { flex: 1 1 auto; position: relative; overflow: hidden; }
  #wrap canvas { display: block; }

  /* ── Coordinate readout (bottom-left) ── */
  #coords {
    position: absolute; bottom: 8px; left: 8px; z-index: 5;
    font-size: 11px; font-family: monospace; color: #888;
    background: rgba(0,0,0,.55); padding: 3px 8px; border-radius: 4px;
    pointer-events: none;
  }

  /* ── Section height slider (bottom-centre) ── */
  #sectionBar {
    display: none; position: absolute; bottom: 10px; left: 50%;
    transform: translateX(-50%); z-index: 5;
    align-items: center; gap: 8px;
    background: rgba(0,0,0,.72); padding: 6px 14px; border-radius: 8px;
  }
  #sectionBar label { font-size: 12px; color: #aaa; }
  #sectionSlider { width: 160px; }
</style>
</head>
<body>

<!-- ── Toolbar ── -->
<div id="toolbar">
  <button class="tb-btn active" data-mode="orbit"  title="Orbit — drag rotates (O)">◯ Orbit</button>
  <button class="tb-btn"        data-mode="pan"    title="Pan — drag translates">↖ Pan</button>
  <button class="tb-btn"        data-mode="walk"   title="Walk — WASD / arrows, drag looks">🚶 Walk</button>
  <button class="tb-btn"        data-mode="pivot"  title="Pivot — orbit around clicked point">⊕ Pivot</button>
  <div class="sep"></div>
  <button class="tb-btn"        data-mode="fit"    title="Fit all (F)">⌖ Fit</button>
  <button class="tb-btn"        data-mode="home"   title="Reset to opening view (H)">⌂ Home</button>
  <button class="tb-btn"        data-mode="top"    title="Top-down view (T)">⬇ Top</button>
  <button class="tb-btn"        data-mode="level"  title="Level the horizon (L)">— Level</button>
  <div class="sep"></div>
  <button class="tb-btn"        data-mode="section" title="Toggle section cut (X)">✂ Section</button>
  <div class="sep"></div>
  <span id="status-txt">Loading…</span>
</div>

<!-- ── Canvas ── -->
<div id="wrap">
  <div id="coords">X — Y — Z —</div>
  <div id="sectionBar">
    <label>Height</label>
    <input id="sectionSlider" type="range" min="0" max="100" value="100" />
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three":         "https://unpkg.com/three@0.160.0/build/three.module.min.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
"use strict";
import * as THREE          from "three";
import { GLTFLoader }      from "three/addons/loaders/GLTFLoader.js";
import { OrbitControls }   from "three/addons/controls/OrbitControls.js";
import { DRACOLoader }     from "three/addons/loaders/DRACOLoader.js";

// ── Params ──────────────────────────────────────────────────────────────────
const params    = new URLSearchParams(location.search);
const projectId = params.get("project");
const modelId   = params.get("model");
const token     = localStorage.getItem("planscape_token");
const setStatus = s => { document.getElementById("status-txt").textContent = s; };

if (!projectId || !modelId) { setStatus("Missing project / model id."); throw 0; }

// ── Scene ────────────────────────────────────────────────────────────────────
const wrap  = document.getElementById("wrap");
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x141418);
scene.add(new THREE.HemisphereLight(0xffffff, 0x334466, 0.85));
const sun = new THREE.DirectionalLight(0xfff4e0, 0.75);
sun.position.set(1, 2, 1.5); scene.add(sun);

const camera = new THREE.PerspectiveCamera(50, wrap.clientWidth / wrap.clientHeight, 0.01, 50000);
camera.up.set(0, 1, 0); // always Y-up for OrbitControls; Z-up models are rotated on load

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(wrap.clientWidth, wrap.clientHeight);
wrap.appendChild(renderer.domElement);

new ResizeObserver(() => {
  const w = wrap.clientWidth, h = wrap.clientHeight;
  camera.aspect = w / h; camera.updateProjectionMatrix();
  renderer.setSize(w, h);
}).observe(wrap);

// ── OrbitControls (default Y-up — matches camera.up) ────────────────────────
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true; controls.dampingFactor = 0.08;
controls.screenSpacePanning = true;

// ── Section clip ─────────────────────────────────────────────────────────────
const clipPlane   = new THREE.Plane(new THREE.Vector3(0, -1, 0), 0);
let sectionActive = false;
let secMin = 0, secMax = 1;
const sectionBar = document.getElementById("sectionBar");
const slider     = document.getElementById("sectionSlider");
slider.addEventListener("input", () => {
  clipPlane.constant = secMin + (secMax - secMin) * (+slider.value / 100);
});

// ── Model state ───────────────────────────────────────────────────────────────
let modelBounds = new THREE.Box3();
let homePos, homeTarget;

// ── PCA — principal axis of building footprint ────────────────────────────────
// After Y-up normalization the horizontal plane is always XZ.
// Returns unit vector of long axis in that plane.
function pcaLongAxis(group) {
  const MAX = 40000;
  let total = 0;
  group.traverse(n => { if (n.isMesh) total += n.geometry.attributes.position.count; });
  const step = Math.max(1, Math.ceil(total / MAX));

  const xs = [], zs = [];
  const tmp = new THREE.Vector3();
  group.traverse(n => {
    if (!n.isMesh) return;
    const pos = n.geometry.attributes.position;
    for (let i = 0; i < pos.count; i += step) {
      tmp.fromBufferAttribute(pos, i).applyMatrix4(n.matrixWorld);
      xs.push(tmp.x); zs.push(tmp.z);
    }
  });

  const N = xs.length; if (N < 4) return null;
  let mx = 0, mz = 0;
  for (let i = 0; i < N; i++) { mx += xs[i]; mz += zs[i]; }
  mx /= N; mz /= N;

  let cxx = 0, cxz = 0, czz = 0;
  for (let i = 0; i < N; i++) {
    const dx = xs[i] - mx, dz = zs[i] - mz;
    cxx += dx*dx; cxz += dx*dz; czz += dz*dz;
  }
  cxx /= N; cxz /= N; czz /= N;

  // Dominant eigenvector of 2×2 symmetric matrix.
  const disc = Math.sqrt(Math.max(0, ((cxx-czz)*(cxx-czz))/4 + cxz*cxz));
  const lam1 = (cxx+czz)/2 + disc;
  let ex, ez;
  if (Math.abs(cxz) > 1e-12) { ex = lam1 - czz; ez = cxz; }
  else { ex = cxx >= czz ? 1 : 0; ez = cxx >= czz ? 0 : 1; }
  const L = Math.sqrt(ex*ex + ez*ez);
  return { x: ex/L, z: ez/L };
}

// ── Camera helpers ────────────────────────────────────────────────────────────
function fitCamera() {
  if (modelBounds.isEmpty()) return;
  const size   = modelBounds.getSize(new THREE.Vector3());
  const centre = modelBounds.getCenter(new THREE.Vector3());
  const maxDim = Math.max(size.x, size.y, size.z) || 1;
  const dist   = maxDim * 1.8;

  // PCA on horizontal XZ plane for best initial angle.
  // The scene is always Y-up at this point (Z-up models were rotated on load).
  const pca  = pcaLongAxis(scene);
  // Minor axis (perpendicular to long axis) = look direction → camera offset.
  const minX = pca ?  pca.z : 0;   // perpendicular in X
  const minZ = pca ? -pca.x : -1;  // perpendicular in Z

  camera.up.set(0, 1, 0);
  camera.position.copy(centre).add(
    new THREE.Vector3(minX * dist * 0.85, dist * 0.55, minZ * dist * 0.85));
  controls.target.copy(centre);
  camera.near = Math.max(maxDim / 2000, 0.01);
  camera.far  = Math.max(maxDim * 150, 10000);
  camera.updateProjectionMatrix();
  controls.update();
}

function homeCamera() {
  if (homePos) {
    camera.position.copy(homePos); camera.up.set(0,1,0);
    controls.target.copy(homeTarget); controls.update();
  } else fitCamera();
}

function levelCamera() {
  // Snap to pure Y-up.
  camera.up.set(0, 1, 0); controls.update();
}

function topCamera() {
  if (modelBounds.isEmpty()) return;
  const c = modelBounds.getCenter(new THREE.Vector3());
  const s = modelBounds.getSize(new THREE.Vector3());
  const d = Math.max(s.x, s.y, s.z) * 2.2;
  camera.up.set(0, 0, -1); // north-up for top view
  camera.position.set(c.x, c.y + d, c.z);
  controls.target.copy(c); controls.update();
}

// ── Walk mode ─────────────────────────────────────────────────────────────────
const keys = {};
window.addEventListener("keydown", e => { keys[e.code] = true; });
window.addEventListener("keyup",   e => { keys[e.code] = false; });
let walkActive = false;
let walkSpeed  = 1;

function walkTick(dt) {
  if (!walkActive) return;
  const fwd   = new THREE.Vector3();
  const right = new THREE.Vector3();
  camera.getWorldDirection(fwd); fwd.y = 0; fwd.normalize();
  right.crossVectors(fwd, camera.up).normalize();

  const s = walkSpeed * dt;
  if (keys["KeyW"] || keys["ArrowUp"])    camera.position.addScaledVector(fwd,   s);
  if (keys["KeyS"] || keys["ArrowDown"])  camera.position.addScaledVector(fwd,  -s);
  if (keys["KeyA"] || keys["ArrowLeft"])  camera.position.addScaledVector(right, -s);
  if (keys["KeyD"] || keys["ArrowRight"]) camera.position.addScaledVector(right,  s);
  if (keys["KeyQ"] || keys["PageUp"])     camera.position.y += s;
  if (keys["KeyE"] || keys["PageDown"])   camera.position.y -= s;

  controls.target.copy(camera.position).addScaledVector(fwd, 10);
  controls.update();
}

// ── Coordinate readout ────────────────────────────────────────────────────────
const coordsEl = document.getElementById("coords");
const raycaster = new THREE.Raycaster();
renderer.domElement.addEventListener("mousemove", e => {
  const rect = renderer.domElement.getBoundingClientRect();
  const nx = (e.clientX - rect.left) / rect.width  *  2 - 1;
  const ny = (e.clientY - rect.top)  / rect.height * -2 + 1;
  raycaster.setFromCamera({ x: nx, y: ny }, camera);
  // Hit a large ground plane for coord readout when nothing under cursor.
  const groundPlane = new THREE.Plane(new THREE.Vector3(0,1,0),
    modelBounds.isEmpty() ? 0 : -modelBounds.min.y);
  const hit = new THREE.Vector3();
  raycaster.ray.intersectPlane(groundPlane, hit);
  if (hit) {
    coordsEl.textContent =
      `X ${hit.x.toFixed(2)}  Y ${hit.z.toFixed(2)}  Z ${hit.y.toFixed(2)}`;
  }
});

// ── Toolbar handler ───────────────────────────────────────────────────────────
function setMode(mode) {
  document.querySelectorAll(".tb-btn[data-mode]").forEach(b => {
    if (!["section","fit","home","top","level"].includes(b.dataset.mode))
      b.classList.remove("active");
  });

  walkActive = false;
  controls.enabled = true;

  switch (mode) {
    case "orbit":
      controls.mouseButtons = { LEFT: THREE.MOUSE.ROTATE, MIDDLE: THREE.MOUSE.DOLLY, RIGHT: THREE.MOUSE.PAN };
      document.querySelector('[data-mode="orbit"]').classList.add("active");
      break;
    case "pan":
      controls.mouseButtons = { LEFT: THREE.MOUSE.PAN, MIDDLE: THREE.MOUSE.DOLLY, RIGHT: THREE.MOUSE.ROTATE };
      document.querySelector('[data-mode="pan"]').classList.add("active");
      break;
    case "walk":
      walkActive = true;
      controls.mouseButtons = { LEFT: THREE.MOUSE.ROTATE, MIDDLE: THREE.MOUSE.DOLLY, RIGHT: THREE.MOUSE.PAN };
      document.querySelector('[data-mode="walk"]').classList.add("active");
      break;
    case "pivot":
      // Pivot: orbit around the point under the cursor (set on click).
      controls.mouseButtons = { LEFT: THREE.MOUSE.ROTATE, MIDDLE: THREE.MOUSE.DOLLY, RIGHT: THREE.MOUSE.PAN };
      document.querySelector('[data-mode="pivot"]').classList.add("active");
      renderer.domElement.addEventListener("click", setPivotTarget, { once: true });
      break;
    case "fit":     fitCamera();   break;
    case "home":    homeCamera();  break;
    case "top":     topCamera();   break;
    case "level":   levelCamera(); break;
    case "section":
      document.querySelector('[data-mode="section"]').classList.toggle("active");
      sectionActive = !sectionActive;
      renderer.clippingPlanes = sectionActive ? [clipPlane] : [];
      sectionBar.style.display = sectionActive ? "flex" : "none";
      if (sectionActive) {
        clipPlane.constant = secMin + (secMax - secMin) * (+slider.value / 100);
      }
      return; // don't switch mode
  }
}

function setPivotTarget(e) {
  const rect = renderer.domElement.getBoundingClientRect();
  const nx = (e.clientX - rect.left) / rect.width  *  2 - 1;
  const ny = (e.clientY - rect.top)  / rect.height * -2 + 1;
  raycaster.setFromCamera({ x: nx, y: ny }, camera);
  const hits = raycaster.intersectObjects(scene.children, true);
  if (hits.length) controls.target.copy(hits[0].point);
  controls.update();
}

document.getElementById("toolbar").addEventListener("click", e => {
  const btn = e.target.closest(".tb-btn");
  if (btn) setMode(btn.dataset.mode);
});

// ── Keyboard shortcuts ────────────────────────────────────────────────────────
window.addEventListener("keydown", e => {
  if (e.target.tagName === "INPUT") return;
  const map = { f: "fit", h: "home", t: "top", l: "level", o: "orbit",
                w: "walk", x: "section" };
  if (map[e.key.toLowerCase()]) setMode(map[e.key.toLowerCase()]);
});

// ── Render loop ───────────────────────────────────────────────────────────────
let last = performance.now();
(function loop(now) {
  requestAnimationFrame(loop);
  const dt = Math.min((now - last) / 1000, 0.1) * 40;
  last = now;
  walkTick(dt);
  controls.update();
  renderer.render(scene, camera);
})();

// ── Load ──────────────────────────────────────────────────────────────────────
setStatus("Connecting…");
let meta;
try {
  const r = await fetch(`/api/projects/${projectId}/models/${modelId}`,
    { headers: { Authorization: "Bearer " + token } });
  if (!r.ok) throw new Error(`${r.status} — ${await r.text()}`);
  meta = await r.json();
  walkSpeed = (meta.unitScale ?? 1) * 5; // ~5 m/s
} catch (e) {
  setStatus("Session expired — please log in again.  (" + e.message + ")");
}

if (meta) {
  setStatus(`Downloading ${meta.name}…`);

  const draco = new DRACOLoader();
  draco.setDecoderPath("https://unpkg.com/three@0.160.0/examples/jsm/libs/draco/gltf/");
  const loader = new GLTFLoader(); loader.setDRACOLoader(draco);
  loader.requestHeader = { Authorization: "Bearer " + token };

  loader.load(
    `/api/projects/${projectId}/models/${modelId}/file`,
    gltf => {
      const root = gltf.scene;

      // ── Normalise to Y-up ──
      // Revit GLB exports are typically Z-up. Rotating the root node
      // -90° around X converts Z-up → Y-up so OrbitControls works
      // correctly without any camera.up hacks.
      root.updateMatrixWorld(true);
      const testBounds = new THREE.Box3().setFromObject(root);
      const ts = testBounds.getSize(new THREE.Vector3());
      const isZUp = ts.z <= ts.x && ts.z <= ts.y; // shortest axis = up axis

      if (isZUp) {
        root.rotation.x = -Math.PI / 2; // Z-up → Y-up
        root.updateMatrixWorld(true);
      }

      scene.add(root);
      modelBounds.setFromObject(root); // AABB after normalisation

      // Section plane clips on Y (always Y-up now).
      clipPlane.normal.set(0, -1, 0);
      secMin = modelBounds.min.y;
      secMax = modelBounds.max.y;
      clipPlane.constant = secMax; // start fully open

      // Fit camera using PCA of floor plan.
      fitCamera();

      // Save home.
      homePos    = camera.position.clone();
      homeTarget = controls.target.clone();

      setStatus(`${meta.name} · ${(meta.fileSizeBytes / 1024 / 1024).toFixed(1)} MB`);
      walkSpeed = Math.max(modelBounds.getSize(new THREE.Vector3()).length() * 0.01, 0.5);
    },
    p => { if (p.total > 0) setStatus(`${meta.name} · ${Math.round(p.loaded/p.total*100)}%`); },
    e => setStatus("Load failed: " + (e?.message || e))
  );
}
</script>
</body>
</html>
