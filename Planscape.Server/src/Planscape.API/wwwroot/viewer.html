<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Planscape — model viewer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%; overflow: hidden;
    background: #111; color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    /* flex column: toolbar on top, canvas fills rest */
    display: flex; flex-direction: column;
  }

  /* ── Toolbar — full-width header, never overlaps canvas ── */
  #toolbar {
    flex: 0 0 auto;
    display: flex; align-items: center; gap: 6px;
    padding: 0 10px;
    height: 40px;
    background: #1e1e2a;
    border-bottom: 1px solid #333;
    overflow-x: auto; white-space: nowrap;
  }
  #toolbar .sep { width: 1px; height: 22px; background: #444; flex-shrink: 0; }
  #status-inline {
    flex: 1 1 auto; font-size: 12px; color: #999;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    min-width: 0;
  }

  .nav-btn {
    flex-shrink: 0;
    background: transparent;
    border: 1px solid #444; border-radius: 4px;
    color: #ccc; font-size: 12px; padding: 4px 10px;
    cursor: pointer; user-select: none;
    transition: background .12s, color .12s, border-color .12s;
  }
  .nav-btn:hover  { background: #2a3a60; border-color: #5580cc; color: #fff; }
  .nav-btn.active { background: #1e4a9e; border-color: #6699ff; color: #fff; }

  /* ── Level selector row (hidden until levels found) ── */
  #levelBar {
    flex: 0 0 auto;
    display: none; gap: 4px; padding: 4px 10px;
    background: #181f18; border-bottom: 1px solid #2a3a2a;
    overflow-x: auto; white-space: nowrap;
  }
  .lvl-btn {
    flex-shrink: 0;
    background: transparent; border: 1px solid #2a4a2a;
    border-radius: 4px; color: #7c7; font-size: 11px; padding: 3px 8px;
    cursor: pointer; user-select: none;
  }
  .lvl-btn:hover  { background: #1a401a; color: #afa; }
  .lvl-btn.active { background: #154a15; border-color: #4a8a4a; color: #cfc; }

  /* ── Canvas wrapper fills remaining space ── */
  #canvasWrap {
    flex: 1 1 auto; position: relative; overflow: hidden;
  }
  #canvasWrap canvas { display: block; width: 100% !important; height: 100% !important; }

  /* ── Section slider (bottom-centre, inside canvas wrap) ── */
  #sectionBar {
    display: none; position: absolute; bottom: 12px; left: 50%;
    transform: translateX(-50%); z-index: 5;
    align-items: center; gap: 8px;
    background: rgba(0,0,0,.75); padding: 6px 14px; border-radius: 8px;
  }
  #sectionBar label { font-size: 12px; color: #aaa; }
  #sectionSlider { width: 160px; }
</style>
</head>
<body>

<!-- ── Toolbar ─────────────────────────────────────────────────────── -->
<div id="toolbar">
  <button class="nav-btn active" data-mode="orbit" title="Orbit (drag to rotate)">◯ Orbit</button>
  <button class="nav-btn"       data-mode="pan"   title="Pan (drag to translate)">↖ Pan</button>
  <div class="sep"></div>
  <button class="nav-btn"       data-mode="fit"   title="Fit model — F">⌖ Fit</button>
  <button class="nav-btn"       data-mode="home"  title="Home view — H">⌂ Home</button>
  <button class="nav-btn"       data-mode="top"   title="Top-down — T">⬇ Top</button>
  <button class="nav-btn"       data-mode="level" title="Level horizon — L">— Level</button>
  <div class="sep"></div>
  <button class="nav-btn"       data-mode="section" title="Section cut toggle">✂ Section</button>
  <div class="sep"></div>
  <span id="status-inline">Loading…</span>
</div>

<!-- ── Level buttons (shown when storeys found in model) ── -->
<div id="levelBar"></div>

<!-- ── Three.js canvas lives here ── -->
<div id="canvasWrap">
  <div id="sectionBar">
    <label>Height</label>
    <input id="sectionSlider" type="range" min="0" max="100" value="100" />
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three":         "https://unpkg.com/three@0.160.0/build/three.module.min.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
"use strict";
import * as THREE        from "three";
import { GLTFLoader }    from "three/addons/loaders/GLTFLoader.js";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";
import { DRACOLoader }   from "three/addons/loaders/DRACOLoader.js";

// ── URL params ──────────────────────────────────────────────────────────────
const params    = new URLSearchParams(location.search);
const projectId = params.get("project");
const modelId   = params.get("model");
const token     = localStorage.getItem("planscape_token");
const statusEl  = document.getElementById("status-inline");
const setStatus = s => { statusEl.textContent = s; };

if (!projectId || !modelId) { setStatus("Missing project / model id."); throw 0; }

// ── Scene setup ─────────────────────────────────────────────────────────────
const wrap = document.getElementById("canvasWrap");

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x141418);
scene.add(new THREE.HemisphereLight(0xffffff, 0x334466, 0.85));
const sun = new THREE.DirectionalLight(0xfff4e0, 0.75);
sun.position.set(1, 2, 1.5); scene.add(sun);

const camera = new THREE.PerspectiveCamera(50, wrap.clientWidth / wrap.clientHeight, 0.01, 50000);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(wrap.clientWidth, wrap.clientHeight);
wrap.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true; controls.dampingFactor = 0.08;

new ResizeObserver(() => {
  const w = wrap.clientWidth, h = wrap.clientHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
}).observe(wrap);

// ── Section plane ────────────────────────────────────────────────────────────
const clipPlane   = new THREE.Plane(new THREE.Vector3(0, 0, -1), 0);
let sectionActive = false;
let secMin = 0, secMax = 1;
const sectionBar = document.getElementById("sectionBar");
const slider     = document.getElementById("sectionSlider");
slider.addEventListener("input", () => {
  const h = secMin + (secMax - secMin) * (+slider.value / 100);
  clipPlane.constant = h;
});

// ── Model state ──────────────────────────────────────────────────────────────
let modelGroup = null, modelBounds = new THREE.Box3();
let homePos, homeTarget, homeUp;
let isZUp = true;

// ── PCA — find the real long axis of the model footprint ─────────────────────
// Samples up to 40k vertices and computes the covariance matrix on the
// horizontal plane so fitCamera() can orient the camera perpendicular to
// the building's actual long axis, regardless of how the GLB is rotated.
function computeGroundPrincipalAxis(group, zUp) {
  const MAX = 40000;
  let total = 0;
  group.traverse(n => { if (n.isMesh) total += n.geometry.attributes.position.count; });
  const step = Math.max(1, Math.floor(total / MAX));

  let xs = [], ys = [];
  const tmp = new THREE.Vector3();
  group.traverse(n => {
    if (!n.isMesh) return;
    const pos = n.geometry.attributes.position;
    for (let i = 0; i < pos.count; i += step) {
      tmp.fromBufferAttribute(pos, i).applyMatrix4(n.matrixWorld);
      xs.push(tmp.x);
      ys.push(zUp ? tmp.y : tmp.z);
    }
  });

  const N = xs.length;
  if (N < 4) return null;

  let mx = 0, my = 0;
  for (let i = 0; i < N; i++) { mx += xs[i]; my += ys[i]; }
  mx /= N; my /= N;

  let cxx = 0, cxy = 0, cyy = 0;
  for (let i = 0; i < N; i++) {
    const dx = xs[i] - mx, dy = ys[i] - my;
    cxx += dx * dx; cxy += dx * dy; cyy += dy * dy;
  }
  cxx /= N; cxy /= N; cyy /= N;

  // Dominant eigenvector of 2×2 symmetric covariance matrix.
  const disc = Math.sqrt(Math.max(0, ((cxx - cyy) * (cxx - cyy)) / 4 + cxy * cxy));
  const lam1 = (cxx + cyy) / 2 + disc;
  let ex, ey;
  if (Math.abs(cxy) > 1e-12) { ex = lam1 - cyy; ey = cxy; }
  else { ex = cxx >= cyy ? 1 : 0; ey = cxx >= cyy ? 0 : 1; }
  const L = Math.sqrt(ex * ex + ey * ey);
  return { x: ex / L, y: ey / L }; // unit vector along long axis
}

// ── fitCamera ────────────────────────────────────────────────────────────────
function fitCamera() {
  if (!modelGroup || modelBounds.isEmpty()) return;
  const size   = modelBounds.getSize(new THREE.Vector3());
  const centre = modelBounds.getCenter(new THREE.Vector3());
  const maxDim = Math.max(size.x, size.y, size.z) || 1;
  const dist   = maxDim * 1.8;

  const ax = size.x, ay = size.y, az = size.z;
  isZUp = az <= ax && az <= ay; // shortest axis = up axis

  if (isZUp) {
    camera.up.set(0, 0, 1);
    // PCA gives long-axis direction in XY plane.
    const pca = computeGroundPrincipalAxis(modelGroup, false /* X,Y coords */);
    // Camera looks from the minor-axis direction (perpendicular to long axis).
    const px = pca ? -pca.y : (ax >= ay ? 0 : -1);
    const py = pca ?  pca.x : (ax >= ay ? -1 : 0);
    camera.position.copy(centre).add(
      new THREE.Vector3(px * dist * 0.85, py * dist * 0.85, dist * 0.55));
  } else if (ay <= ax && ay <= az) {
    // Y-up
    camera.up.set(0, 1, 0);
    const pca = computeGroundPrincipalAxis(modelGroup, true /* X,Z coords */);
    const px = pca ? -pca.y : (ax >= az ? 0 : -1);
    const pz = pca ?  pca.x : (ax >= az ? -1 : 0);
    camera.position.copy(centre).add(
      new THREE.Vector3(px * dist * 0.85, dist * 0.55, pz * dist * 0.85));
  } else {
    // X-up (rare)
    camera.up.set(1, 0, 0);
    camera.position.copy(centre).add(
      new THREE.Vector3(dist * 0.55, ay >= az ? 0 : -dist * 0.85,
                        ay >= az ? -dist * 0.85 : 0));
  }

  controls.target.copy(centre);
  camera.near = Math.max(maxDim / 2000, 0.01);
  camera.far  = Math.max(maxDim * 150, 10000);
  camera.updateProjectionMatrix();
  controls.update();
}

// ── Other camera helpers ─────────────────────────────────────────────────────
function homeCamera() {
  if (homePos) {
    camera.position.copy(homePos); camera.up.copy(homeUp);
    controls.target.copy(homeTarget); controls.update();
  } else fitCamera();
}

function levelCamera() {
  const u = camera.up;
  const ax = Math.abs(u.x), ay = Math.abs(u.y), az = Math.abs(u.z);
  if (az >= ax && az >= ay) camera.up.set(0, 0, u.z > 0 ? 1 : -1);
  else if (ay >= ax)         camera.up.set(0, u.y > 0 ? 1 : -1, 0);
  else                       camera.up.set(u.x > 0 ? 1 : -1, 0, 0);
  controls.update();
}

function topCamera() {
  if (!modelGroup || modelBounds.isEmpty()) return;
  const centre = modelBounds.getCenter(new THREE.Vector3());
  const size   = modelBounds.getSize(new THREE.Vector3());
  const d = Math.max(size.x, size.y, size.z) * 2.2;
  const up = isZUp ? new THREE.Vector3(0, 0, 1) : new THREE.Vector3(0, 1, 0);
  camera.up.copy(up);
  const eye = isZUp
    ? centre.clone().add(new THREE.Vector3(0, 0, d))
    : centre.clone().add(new THREE.Vector3(0, d, 0));
  camera.position.copy(eye);
  controls.target.copy(centre); controls.update();
}

// ── Toolbar ──────────────────────────────────────────────────────────────────
document.getElementById("toolbar").addEventListener("click", e => {
  const btn = e.target.closest(".nav-btn");
  if (!btn) return;
  const mode = btn.dataset.mode;

  if (mode !== "section") {
    document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
  }

  switch (mode) {
    case "orbit":
      controls.mouseButtons = { LEFT: THREE.MOUSE.ROTATE, MIDDLE: THREE.MOUSE.DOLLY, RIGHT: THREE.MOUSE.PAN };
      break;
    case "pan":
      controls.mouseButtons = { LEFT: THREE.MOUSE.PAN, MIDDLE: THREE.MOUSE.DOLLY, RIGHT: THREE.MOUSE.ROTATE };
      break;
    case "fit":   fitCamera();   break;
    case "home":  homeCamera();  break;
    case "level": levelCamera(); break;
    case "top":   topCamera();   break;
    case "section":
      btn.classList.toggle("active");
      sectionActive = !sectionActive;
      renderer.clippingPlanes = sectionActive ? [clipPlane] : [];
      sectionBar.style.display = sectionActive ? "flex" : "none";
      if (sectionActive) {
        const h = secMin + (secMax - secMin) * (+slider.value / 100);
        clipPlane.constant = h;
      }
      break;
  }
});

window.addEventListener("keydown", e => {
  if (e.target.tagName === "INPUT") return;
  ({ f: ()=>fitCamera(), h: ()=>homeCamera(), l: ()=>levelCamera(), t: ()=>topCamera() }
  [e.key.toLowerCase()]?.());
});

// ── Level nav from scene nodes ────────────────────────────────────────────────
function buildLevelButtons(gltf) {
  const rx = /storey|floor|level|étage|piso|ebene/i;
  const levels = [];
  gltf.scene.traverse(n => {
    if (rx.test(n.name) && n.name.length < 60) {
      const b = new THREE.Box3().setFromObject(n);
      if (!b.isEmpty()) levels.push({ name: n.name, box: b });
    }
  });
  if (!levels.length) return;
  levels.sort((a, b) => a.box.min.z - b.box.min.z);
  const bar = document.getElementById("levelBar");
  levels.forEach(lvl => {
    const btn = document.createElement("button");
    btn.className = "lvl-btn";
    btn.textContent = lvl.name.replace(/^.*?(?:storey|floor|level)\s*/i, '') || lvl.name;
    btn.title = lvl.name;
    btn.addEventListener("click", () => {
      document.querySelectorAll(".lvl-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      const top = lvl.box.max.z;
      const pct = Math.round(((top - secMin) / (secMax - secMin)) * 100);
      sectionActive = true;
      renderer.clippingPlanes = [clipPlane];
      sectionBar.style.display = "flex";
      document.querySelector('[data-mode="section"]').classList.add("active");
      slider.value = pct; clipPlane.constant = top;
      const c = lvl.box.getCenter(new THREE.Vector3());
      const s = lvl.box.getSize(new THREE.Vector3());
      const d = Math.max(s.x, s.y, s.z) * 1.5;
      camera.position.copy(c).add(new THREE.Vector3(0, -d * 0.8, d * 0.6));
      controls.target.copy(c); controls.update();
    });
    bar.appendChild(btn);
  });
  bar.style.display = "flex";
}

// ── Render loop ───────────────────────────────────────────────────────────────
(function loop() { requestAnimationFrame(loop); controls.update(); renderer.render(scene, camera); })();

// ── Fetch metadata ────────────────────────────────────────────────────────────
setStatus("Connecting…");
let meta;
try {
  const r = await fetch(`/api/projects/${projectId}/models/${modelId}`,
    { headers: { Authorization: "Bearer " + token } });
  if (!r.ok) throw new Error(`${r.status} — ${await r.text()}`);
  meta = await r.json();
} catch (e) {
  setStatus("Login expired — go back to dashboard and log in again.  (" + e.message + ")");
}

if (meta) {
  setStatus(`Downloading ${meta.name}…`);

  const draco = new DRACOLoader();
  draco.setDecoderPath("https://unpkg.com/three@0.160.0/examples/jsm/libs/draco/gltf/");
  const loader = new GLTFLoader();
  loader.setDRACOLoader(draco);
  loader.requestHeader = { Authorization: "Bearer " + token };

  loader.load(
    `/api/projects/${projectId}/models/${modelId}/file`,
    gltf => {
      modelGroup = gltf.scene;
      scene.add(modelGroup);

      // World AABB after all transforms applied.
      modelGroup.updateMatrixWorld(true);
      modelBounds.setFromObject(modelGroup);
      const size = modelBounds.getSize(new THREE.Vector3());

      // Determine vertical axis for section plane.
      const ax = size.x, ay = size.y, az = size.z;
      if (az >= ax && az >= ay) {
        // Z is tallest → Z-up
        clipPlane.normal.set(0, 0, -1);
        secMin = modelBounds.min.z; secMax = modelBounds.max.z;
      } else {
        // Y-up
        clipPlane.normal.set(0, -1, 0);
        secMin = modelBounds.min.y; secMax = modelBounds.max.y;
      }

      fitCamera();

      homePos    = camera.position.clone();
      homeTarget = controls.target.clone();
      homeUp     = camera.up.clone();

      setStatus(`${meta.name} · ${(meta.fileSizeBytes / 1024 / 1024).toFixed(1)} MB`);
      buildLevelButtons(gltf);
    },
    p => { if (p.total > 0) setStatus(`${meta.name} · ${Math.round(p.loaded / p.total * 100)}%`); },
    e => setStatus("Load failed: " + (e?.message || e))
  );
}
</script>
</body>
</html>
