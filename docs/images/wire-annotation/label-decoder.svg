<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 440" font-family="Segoe UI, Arial, sans-serif">
  <rect x="0.5" y="0.5" width="719" height="439" rx="10" fill="#ffffff" stroke="#CFD8DC"/>
  <text x="28" y="38" font-size="20" font-weight="700" fill="#263238">Reading the label, chunk by chunk</text>

  <g font-size="14" fill="#ffffff" text-anchor="middle">
    <!-- rows: pill + meaning -->
    <rect x="28" y="60" width="150" height="34" rx="6" fill="#00897B"/>
    <text x="103" y="83">2 &#215; 4mm&#178; Cu</text>
    <rect x="28" y="105" width="150" height="34" rx="6" fill="#1565C0"/>
    <text x="103" y="128">1&#216;</text>
    <rect x="28" y="150" width="150" height="34" rx="6" fill="#3949AB"/>
    <text x="103" y="173">L1-06</text>
    <rect x="28" y="195" width="150" height="34" rx="6" fill="#546E7A"/>
    <text x="103" y="218">DB-1</text>
    <rect x="28" y="240" width="150" height="34" rx="6" fill="#6D4C41"/>
    <text x="103" y="263">Meth.C</text>
    <rect x="28" y="285" width="150" height="34" rx="6" fill="#0097A7"/>
    <text x="103" y="308">&#216;20mm</text>
    <rect x="28" y="330" width="150" height="34" rx="6" fill="#2E7D32"/>
    <text x="103" y="353">Fill 28%</text>
    <rect x="28" y="375" width="150" height="34" rx="6" fill="#C62828"/>
    <text x="103" y="398">** VD=3.4%</text>
  </g>

  <g font-size="15" fill="#37474F">
    <text x="205" y="83">Two copper wires, each 4mm&#178; thick</text>
    <text x="205" y="128">Single-phase (ordinary power, not 3-phase)</text>
    <text x="205" y="173">Circuit 6 on the board</text>
    <text x="205" y="218">Fed from Distribution Board 1</text>
    <text x="205" y="263">Install method C (clipped to a surface)</text>
    <text x="205" y="308">The conduit is 20 mm across</text>
    <text x="205" y="353">Cable fills 28% of the conduit (roomy)</text>
    <text x="205" y="398" fill="#C62828" font-weight="600">&#9888; Volt-drop 3.4% &#8212; over the 3% alarm</text>
  </g>

  <g fill="#B0BEC5">
