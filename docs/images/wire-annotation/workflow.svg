<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 210" font-family="Segoe UI, Arial, sans-serif">
  <rect x="0.5" y="0.5" width="899" height="209" rx="10" fill="#ffffff" stroke="#CFD8DC"/>
  <text x="24" y="34" font-size="19" font-weight="700" fill="#263238">The happy path &#8212; do these in order</text>

  <!-- Step 1 -->
  <g>
    <rect x="20" y="55" width="150" height="120" rx="8" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.5"/>
    <path d="M20 63 a8 8 0 0 1 8 -8 h134 a8 8 0 0 1 8 8 v26 h-150 z" fill="#1565C0"/>
    <text x="95" y="82" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">&#9312;  W-Stamp</text>
    <text x="95" y="115" font-size="12.5" fill="#37474F" text-anchor="middle">Read circuit facts</text>
    <text x="95" y="133" font-size="12.5" fill="#37474F" text-anchor="middle">onto the conduit</text>
    <text x="95" y="160" font-size="11" fill="#90A4AE" text-anchor="middle">(nothing drawn yet)</text>
  </g>
  <!-- Step 2 -->
  <g>
    <rect x="195" y="55" width="150" height="120" rx="8" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
    <path d="M195 63 a8 8 0 0 1 8 -8 h134 a8 8 0 0 1 8 8 v26 h-150 z" fill="#2E7D32"/>
    <text x="270" y="82" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">&#9313;  Csz-Sync</text>
    <text x="270" y="115" font-size="12.5" fill="#37474F" text-anchor="middle">Pick the cable</text>
    <text x="270" y="133" font-size="12.5" fill="#37474F" text-anchor="middle">thickness (CSA)</text>
    <text x="270" y="160" font-size="11" fill="#90A4AE" text-anchor="middle">set install method first</text>
  </g>
  <!-- Step 3 -->
  <g>
    <rect x="370" y="55" width="150" height="120" rx="8" fill="#FFF3E0" stroke="#EF6C00" stroke-width="1.5"/>
    <path d="M370 63 a8 8 0 0 1 8 -8 h134 a8 8 0 0 1 8 8 v26 h-150 z" fill="#EF6C00"/>
    <text x="445" y="82" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">&#9314;  VD-Sync</text>
    <text x="445" y="115" font-size="12.5" fill="#37474F" text-anchor="middle">Work out</text>
    <text x="445" y="133" font-size="12.5" fill="#37474F" text-anchor="middle">voltage drop %</text>
    <text x="445" y="160" font-size="11" fill="#90A4AE" text-anchor="middle">flags long/thin runs</text>
  </g>
  <!-- Step 4 -->
  <g>
    <rect x="545" y="55" width="150" height="120" rx="8" fill="#F3E5F5" stroke="#6A1B9A" stroke-width="1.5"/>
    <path d="M545 63 a8 8 0 0 1 8 -8 h134 a8 8 0 0 1 8 8 v26 h-150 z" fill="#6A1B9A"/>
    <text x="620" y="82" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">&#9315;  CPC-Sz</text>
    <text x="620" y="115" font-size="12.5" fill="#37474F" text-anchor="middle">Size the earth</text>
    <text x="620" y="133" font-size="12.5" fill="#37474F" text-anchor="middle">wire</text>
    <text x="620" y="160" font-size="11" fill="#90A4AE" text-anchor="middle">optional</text>
  </g>
  <!-- Step 5 -->
  <g>
    <rect x="720" y="55" width="160" height="120" rx="8" fill="#E0F2F1" stroke="#00897B" stroke-width="1.5"/>
    <path d="M720 63 a8 8 0 0 1 8 -8 h144 a8 8 0 0 1 8 8 v26 h-160 z" fill="#00897B"/>
    <text x="800" y="82" font-size="13.5" font-weight="700" fill="#ffffff" text-anchor="middle">&#9316;  W-Ann / W-Batch</text>
    <text x="800" y="115" font-size="12.5" fill="#37474F" text-anchor="middle">Draw the ticks</text>
    <text x="800" y="133" font-size="12.5" fill="#37474F" text-anchor="middle">+ the label</text>
    <text x="800" y="160" font-size="11" fill="#00897B" text-anchor="middle" font-weight="700">it appears now &#10003;</text>
  </g>

  <!-- arrows -->
  <g fill="#B0BEC5">
    <path d="M172 115 l16 0 l0 -6 l12 9 l-12 9 l0 -6 l-16 0 z"/>
    <path d="M347 115 l16 0 l0 -6 l12 9 l-12 9 l0 -6 l-16 0 z"/>
    <path d="M522 115 l16 0 l0 -6 l12 9 l-12 9 l0 -6 l-16 0 z"/>
    <path d="M697 115 l16 0 l0 -6 l12 9 l-12 9 l0 -6 l-16 0 z"/>
  </g>
</svg>
