# Cloudflare Pages config for Wrangler CLI.
# Used by: wrangler pages deploy ./marketing-site --project-name=planscape-marketing
#
# Pages settings (build command, output dir) live in the Cloudflare dashboard
# under: Pages → planscape-marketing → Settings → Builds & deployments.
# Recommended dashboard settings:
#   Production branch: main
#   Build command:     (empty — static site, no build step)
#   Build output dir:  marketing-site
#   Root directory:    /
#
# This file controls deploy-time options + Function bindings.

name = "planscape-marketing"
pages_build_output_dir = "."
compatibility_date = "2026-05-01"

# Project-wide vars (non-secret)
[vars]
SITE_URL = "https://planscape.build"

# D1 binding for the waitlist Function (functions/api/waitlist.ts)
# Created via: wrangler d1 create planscape-waitlist
[[d1_databases]]
binding       = "WAITLIST_DB"
database_name = "planscape-waitlist"
database_id   = "b7029da2-6019-4ceb-bd87-22870a313db7"

# Per-environment overrides
[env.preview]
name = "planscape-marketing-preview"

[env.preview.vars]
SITE_URL = "https://preview.planscape.build"

[[env.preview.d1_databases]]
binding       = "WAITLIST_DB"
database_name = "planscape-waitlist"
database_id   = "b7029da2-6019-4ceb-bd87-22870a313db7"

[env.production]
name = "planscape-marketing"

[env.production.vars]
SITE_URL = "https://planscape.build"

[[env.production.d1_databases]]
binding       = "WAITLIST_DB"
database_name = "planscape-waitlist"
database_id   = "b7029da2-6019-4ceb-bd87-22870a313db7"
