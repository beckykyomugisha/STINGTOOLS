# Blender Extension manifest — Blender 4.2+ / 5.x extensions system.
# Docs: https://docs.blender.org/manual/en/latest/advanced/extensions/getting_started.html

schema_version = "1.0.0"

# Extension identity
id = "stingtools"
version = "0.1.0"
name = "STINGTools for Blender"
tagline = "ISO 19650 BIM tagging + IDS validation + Planscape federation"
maintainer = "Planscape Limited <info@stingtools.io>"
type = "add-on"
website = "https://stingtools.io"

# Discovery
tags = ["3D View", "Pipeline", "Import-Export"]

# Compatibility
blender_version_min = "4.2.0"
# Tested against Blender 5.1 (latest LTS at time of writing). Newer is fine.

# Licensing
license = ["SPDX:MIT"]
copyright = ["2026 Planscape Limited"]

# Permissions — STING needs filesystem (config + audit log + project overlay
# files) and network (sync to Planscape Server).
[permissions]
files = "Read enums + project overlay files; write audit log."
network = "Sync tags + raise issues to Planscape Server."

# Vendored dependencies (installed under _vendor/ at extension build time)
[build]
# These paths are excluded from the .zip extension bundle
paths_exclude_pattern = [
    "__pycache__/",
    "*.pyc",
    ".git/",
    "tests/",
]
